<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gothic RPG — Zero Player</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=IM+Fell+English&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #060008;
      --bg-panel:  #0c000f;
      --bg-card:   #110015;
      --bg-card2:  #0e0012;
      --border:    #2a1040;
      --border2:   #1a0830;
      --purple:    #9a60c8;
      --purple-dim:#7a4a9a;
      --gold:      #e8b830;
      --gold-dim:  #8a6010;
      --red:       #cc4444;
      --red-dim:   #661020;
      --green:     #44aa55;
      --yellow:    #bbaa22;
      --blue:      #4488cc;
      --text-hi:   #e8d8f8;
      --text-mid:  #c0a0e0;
      --text-lo:   #9070a8;
      --text-dim:  #6a4888;
    }

    body {
      background: var(--bg);
      font-family: 'Courier New', monospace;
      color: var(--text-mid);
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    #app {
      max-width: 980px;
      margin: 0 auto;
      border: 1px solid var(--border);
      background: var(--bg-panel);
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #08000c;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }
    #title-block { display: flex; flex-direction: column; gap: 2px; }
    #title-block h1 {
      font-size: 15px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--purple);
      font-weight: normal;
    }
    #era-display {
      font-size: 11px;
      color: var(--text-mid);
      letter-spacing: 1px;
    }

    /* Speed controls */
    #controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    #controls .label {
      font-size: 10px;
      color: var(--text-mid);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-right: 2px;
    }
    #controls button {
      background: #150020;
      border: 1px solid var(--border);
      color: var(--text-mid);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 4px 13px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.12s, color 0.12s;
    }
    #controls button:hover  { background: #200030; color: var(--text-mid); }
    #controls button.active { background: #2e1050; color: var(--text-hi); border-color: var(--purple-dim); }
    #controls button.danger { border-color: #501010; color: #aa3333; }
    #controls button.danger:hover { background: #1e0808; color: var(--red); }

    #save-status {
      font-size: 10px;
      color: var(--text-lo);
      margin-left: 4px;
      letter-spacing: 1px;
    }

    /* ── Main layout: heroes full-width top, then 2-col bottom ── */
    #heroes-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border2);
    }
    #bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border2);
    }
    #threats-section {
      padding: 16px 20px;
      border-right: 1px solid var(--border2);
    }
    #stats-section {
      padding: 16px 20px;
    }

    /* Section titles */
    .section-title {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-mid);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 3px; height: 12px;
      background: var(--purple);
      border-radius: 1px;
    }

    /* ── Hero cards ── */
    #heroes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .hero-card {
      background: var(--bg-card);
      border: 1px solid var(--border2);
      padding: 12px 14px;
      position: relative;
      transition: border-color 0.2s;
    }
    .hero-card.hunting  { border-color: #5a1a1a; }
    .hero-card.fleeing  { border-color: #1a2a5a; }
    .hero-card.blonde   { border-color: #5a4010; }

    /* accent stripe on left edge */
    .hero-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 0;
    }
    .hero-card.hunting::before  { background: var(--red); opacity: 0.6; }
    .hero-card.fleeing::before  { background: var(--blue); opacity: 0.6; }
    .hero-card.exploring::before { background: var(--purple-dim); opacity: 0.4; }
    .hero-card.blonde::before   { background: var(--gold); opacity: 0.7; }

    .hero-card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .hero-avatar {
      width: 36px; height: 36px;
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .hero-info { flex: 1; min-width: 0; }
    .hero-name {
      font-size: 13px;
      color: var(--text-hi);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
      letter-spacing: 0.5px;
    }
    .hero-name.blonde { color: var(--gold); }
    .hero-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 9px;
      letter-spacing: 1px;
      padding: 1px 6px;
      border: 1px solid;
      text-transform: uppercase;
    }
    .tag-level  { color: #b090e0; border-color: #3a2060; background: #180828; }
    .tag-state-hunt   { color: #e05555; border-color: #5a1515; background: #1a0808; }
    .tag-state-flee   { color: #55aaee; border-color: #153060; background: #080818; }
    .tag-state-explore{ color: #66bb77; border-color: #154020; background: #081008; }

    /* HP bar */
    .hp-track {
      height: 6px;
      background: #1a0a28;
      border-radius: 1px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.4s ease;
    }

    /* stat chips */
    .hero-stats {
      display: flex;
      gap: 10px;
    }
    .stat-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .stat-chip .val { font-size: 13px; color: var(--text-hi); letter-spacing: 0.5px; }
    .stat-chip .lbl { font-size: 10px; color: var(--text-lo); letter-spacing: 1px; text-transform: uppercase; }

    .hero-hp-label {
      font-size: 11px;
      color: var(--text-mid);
      text-align: right;
      margin-bottom: 4px;
    }

    /* ── Threats ── */
    .threat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border2);
    }
    .threat-row:last-of-type { border-bottom: none; }
    .threat-icon {
      font-size: 14px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .threat-name  { font-size: 13px; color: var(--text-hi); flex: 1; }
    .threat-tier  { font-size: 9px;  letter-spacing: 1px; flex-shrink: 0; }
    .threat-xp    { font-size: 9px;  color: var(--text-lo); width: 52px; text-align: right; flex-shrink: 0; letter-spacing: 0.5px; }
    .threat-bar-wrap { width: 50px; flex-shrink: 0; }
    .threat-bar-track { height: 4px; background: #1a0a28; border-radius: 1px; }
    .threat-bar-fill  { height: 100%; background: #882233; border-radius: 1px; }
    .threat-count { font-size: 13px; color: var(--red); width: 28px; text-align: right; flex-shrink: 0; }

    .threat-footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border2);
      display: flex;
      gap: 16px;
    }
    .mini-stat { display: flex; flex-direction: column; gap: 2px; }
    .mini-stat .mv { font-size: 20px; color: var(--text-hi); line-height: 1; }
    .mini-stat .ml { font-size: 10px; color: var(--text-lo); letter-spacing: 1px; text-transform: uppercase; }

    /* ── World stats ── */
    .world-stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border2);
    }
    .world-stat-row:last-child { border-bottom: none; }
    .ws-label { font-size: 13px; color: var(--text-mid); }
    .ws-val   { font-size: 14px; color: var(--text-hi); letter-spacing: 0.5px; }
    .ws-val.highlight { color: var(--gold); }

    /* ── Chronicle ── */
    #log-section {
      padding: 14px 20px 18px;
    }
    #log-lines { }
    .log-entry {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 5px 0;
      border-bottom: 1px solid #0d000f;
      font-size: 12px;
      line-height: 1.5;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-yr {
      font-size: 10px;
      color: var(--text-lo);
      letter-spacing: 1px;
      flex-shrink: 0;
      min-width: 32px;
    }
    .log-icon { font-size: 12px; flex-shrink: 0; }
    .log-msg  { color: var(--text-mid); flex: 1; }
    .log-entry.combat  .log-msg { color: #e05555; }
    .log-entry.loot    .log-msg { color: #d4aa44; }
    .log-entry.level   .log-msg { color: #5599dd; }
    .log-entry.death   .log-msg { color: #aa3344; }
    .log-entry.explore .log-msg { color: #55aa66; }

    /* ── Hero card image ── */
    .hero-card-img {
      width: 100%;
      height: 90px;
      object-fit: cover;
      object-position: top center;
      border-bottom: 1px solid var(--border2);
      margin-bottom: 10px;
      display: block;
      filter: brightness(0.85) saturate(0.9);
    }

    /* ── Combat arena ── */
    .combat-arena {
      display: flex;
      align-items: stretch;
      gap: 0;
      margin: 14px 0 10px;
      background: #080010;
      border: 1px solid #2a0a40;
      overflow: hidden;
      min-height: 180px;
    }
    .arena-fighter {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .arena-fighter img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      object-position: top center;
      display: block;
      filter: brightness(0.8) saturate(0.85);
      transition: filter 0.1s;
    }
    .arena-fighter-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 4px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      font-size: 10px;
      color: var(--text-mid);
      letter-spacing: 1px;
      text-align: center;
    }
    .arena-vs {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      flex-shrink: 0;
      background: #0e0018;
      border-left: 1px solid #2a0a40;
      border-right: 1px solid #2a0a40;
    }
    .arena-vs span {
      font-size: 11px;
      color: var(--purple-dim);
      letter-spacing: 2px;
      writing-mode: vertical-rl;
      text-transform: uppercase;
    }
    .arena-hp-bar {
      position: absolute;
      bottom: 22px; left: 6px; right: 6px;
      height: 4px;
      background: rgba(0,0,0,0.5);
      border-radius: 2px;
    }
    .arena-hp-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ── Hit effect keyframes ── */
    @keyframes hero-flash-hit {
      0%   { filter: brightness(0.8) saturate(0.85); }
      15%  { filter: brightness(2.2) saturate(0.2) sepia(1) hue-rotate(300deg); }
      100% { filter: brightness(0.8) saturate(0.85); }
    }
    @keyframes enemy-flash-hit {
      0%   { filter: brightness(0.8) saturate(0.85); }
      15%  { filter: brightness(2.5) saturate(0.1) sepia(1) hue-rotate(60deg); }
      100% { filter: brightness(0.8) saturate(0.85); }
    }
    .hit-hero  { animation: hero-flash-hit  0.35s ease-out forwards; }
    .hit-enemy { animation: enemy-flash-hit 0.35s ease-out forwards; }

    /* ── Rank tag ── */
    .tag-rank { font-size: 9px; letter-spacing: 1px; padding: 1px 6px; border: 1px solid; text-transform: uppercase; }

    /* ── Hero card selected state ── */
    .hero-card { cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .hero-card:hover { border-color: #3a2060 !important; }
    .hero-card.selected { box-shadow: 0 0 0 2px var(--purple-dim); }

    /* ── Hero detail panel ── */
    #hero-detail { }
    .detail-inner {
      margin-top: 12px;
      background: #0e0018;
      border: 1px solid var(--purple-dim);
      padding: 18px 20px 20px;
      position: relative;
      animation: slideDown 0.18s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .detail-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: 1px solid var(--border);
      color: var(--text-lo); font-family: 'Courier New', monospace;
      font-size: 10px; padding: 3px 10px; cursor: pointer;
      letter-spacing: 1px;
    }
    .detail-close:hover { background: #1a0828; color: var(--text-mid); }

    .detail-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border2);
    }
    .detail-avatar {
      width: 56px; height: 56px; border-radius: 2px; border: 2px solid;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .detail-identity { flex: 1; min-width: 0; }
    .detail-name {
      font-size: 18px; color: var(--text-hi);
      letter-spacing: 1px; margin-bottom: 4px;
    }
    .detail-name.blonde { color: var(--gold); }
    .detail-rank-line { font-size: 13px; margin-bottom: 6px; letter-spacing: 1px; }
    .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .detail-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .detail-col { min-width: 0; }
    .detail-section-label {
      font-size: 9px; letter-spacing: 3px; color: var(--purple-dim);
      text-transform: uppercase; margin-bottom: 10px;
      border-bottom: 1px solid var(--border2); padding-bottom: 4px;
    }

    .detail-bar-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .detail-bar-label { font-size: 10px; color: var(--text-lo); width: 20px; flex-shrink: 0; letter-spacing: 1px; }
    .detail-bar-val   { font-size: 10px; color: var(--text-mid); width: 60px; text-align: right; flex-shrink: 0; }

    .detail-next-rank {
      font-size: 11px; color: var(--text-lo); margin-top: 4px; letter-spacing: 0.5px;
    }

    .detail-stat-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .detail-stat {
      background: var(--bg-card2); border: 1px solid var(--border2);
      padding: 8px 6px; text-align: center; border-radius: 0;
    }
    .dsv { display: block; font-size: 18px; color: var(--text-hi); line-height: 1.2; }
    .dsl { display: block; font-size: 9px;  color: var(--text-lo); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* Rank strip */
    .rank-strip {
      display: flex; flex-direction: column; gap: 4px;
    }
    .rank-pip {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 8px;
      border: 1px solid var(--border2);
      background: var(--bg-card2);
      opacity: 0.45;
    }
    .rank-pip.done    { opacity: 0.7; }
    .rank-pip.current { opacity: 1; background: #150020; }
    .rank-pip-badge { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
    .rank-pip-name  { font-size: 11px; color: var(--text-mid); flex: 1; }
    .rank-pip-lvl   { font-size: 9px;  color: var(--text-dim); letter-spacing: 1px; }
    .rank-pip.current .rank-pip-name { color: var(--text-hi); }
    .rank-pip.current .rank-pip-lvl  { color: var(--text-lo); }

    .detail-log { }

    /* ── Arena shake animation ── */
    @keyframes shake-hero {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(6px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }
    @keyframes shake-enemy {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(8px); }
      40%  { transform: translateX(-6px); }
      60%  { transform: translateX(4px); }
      80%  { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }
    .arena-fighter { transform-origin: center; }
    .shake-hero  { animation: shake-hero  0.32s ease-out; }
    .shake-enemy { animation: shake-enemy 0.32s ease-out; }

    /* ── Arena section wrapper ── */
    .arena-section {
      margin: 0 0 16px;
    }
    .arena-section-label {
      font-size: 9px; letter-spacing: 3px; color: var(--red);
      text-transform: uppercase; margin-bottom: 8px;
      border-bottom: 1px solid #3a0a18; padding-bottom: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .arena-section-label::before {
      content: '⚔'; font-size: 10px;
    }

    /* ── Reset modal ── */
    #reset-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #reset-modal.open { display: flex; }
    .modal-box {
      background: #0e0015;
      border: 1px solid #5a1a7a;
      padding: 28px 32px;
      max-width: 340px;
      width: 92%;
      text-align: center;
    }
    .modal-box h2 {
      font-size: 13px; color: var(--red);
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 12px; font-weight: normal;
    }
    .modal-box p {
      font-size: 12px; color: var(--text-mid);
      margin-bottom: 22px; line-height: 1.7;
    }
    .modal-box .btn-row { display: flex; gap: 12px; justify-content: center; }
    .modal-box button {
      background: #150020; border: 1px solid var(--border);
      color: var(--text-mid); font-family: 'Courier New', monospace;
      font-size: 11px; padding: 6px 20px; cursor: pointer;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .modal-box button.confirm { border-color: #6a1a1a; color: var(--red); }
    .modal-box button:hover { background: #200030; }
    .modal-box button.confirm:hover { background: #1e0808; }
  </style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="title-block">
      <h1>Gothic RPG</h1>
      <span id="era-display">Year 1 — Age of Shadow</span>
    </div>
    <div id="controls">
      <span class="label">Speed</span>
      <button id="btn-slow">1×</button>
      <button id="btn-med" class="active">2×</button>
      <button id="btn-fast">4×</button>
      <button id="btn-pause">&#9646;&#9646;</button>
      <span id="save-status">loading...</span>
      <button id="btn-reset" class="danger">⟳ Reset</button>
    </div>
  </div>

  <!-- Heroes row -->
  <div id="heroes-section">
    <div class="section-title">Heroes</div>
    <div id="heroes-grid"></div>
    <div id="hero-detail"></div>
  </div>

  <!-- Threats + Stats -->
  <div id="bottom-row">
    <div id="threats-section">
      <div class="section-title">Active Threats</div>
      <div id="threats-list"></div>
    </div>
    <div id="stats-section">
      <div class="section-title">World Stats</div>
      <div id="stats-list"></div>
    </div>
  </div>

  <!-- Chronicle -->
  <div id="log-section">
    <div class="section-title">Chronicle</div>
    <div id="log-lines"></div>
  </div>

</div>

<!-- Reset confirmation modal -->
<div id="reset-modal">
  <div class="modal-box">
    <h2>RESET THE WORLD?</h2>
    <p>All history, heroes, and chronicles will be permanently erased. The world will begin again from Year 1.</p>
    <div class="btn-row">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-confirm" class="confirm">Erase Everything</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<script>
(function () {
  // ─────────────────────────────────────────────────────────
  //  Constants
  // ─────────────────────────────────────────────────────────
  const HERO_COLORS  = ['#7060d0','#d060a0','#60a0d0','#d0a060','#60d090'];
  const HERO_NAMES   = ['Aldric','Mira','Corvus','Seraphel','Draven','Lirien','Varoth','Elyndra'];
  const HERO_TITLES  = ['the Bold','the Cursed','Darkheart','Ironsoul','Ashborne'];
  const ENEMY_NAMES  = ['Skeleton','Ghoul','Spider','Shade','Golem','Spectre','Troll'];
  // Per-enemy type stats: hp range, atk range, xpReward range
  const ENEMY_STATS  = {
    Skeleton: { hp: [6,  10], atk: [2, 3], xp: [4,  7],  tier: 1 },
    Spider:   { hp: [8,  12], atk: [2, 4], xp: [6,  9],  tier: 1 },
    Ghoul:    { hp: [10, 16], atk: [3, 5], xp: [8,  12], tier: 2 },
    Shade:    { hp: [12, 18], atk: [3, 5], xp: [10, 14], tier: 2 },
    Spectre:  { hp: [14, 20], atk: [4, 6], xp: [13, 17], tier: 3 },
    Golem:    { hp: [18, 26], atk: [5, 7], xp: [16, 22], tier: 3 },
    Troll:    { hp: [22, 32], atk: [6, 9], xp: [20, 28], tier: 4 },
  };
  const LOOT_NAMES   = ['Tome','Blade','Relic','Crystal','Potion','Amulet','Shield'];
  const SAVE_INTERVAL_TICKS = 300;
  const STEP_MS = 120;

  const HERO_IMAGES  = ['hero-red.png','hero-blue.png','hero-green.png','hero-purple.png'];
  const ENEMY_IMAGES = {
    Skeleton:'skeleton.jpg', Ghoul:'ghoul.jpg', Spider:'spider.jpg',
    Shade:'shade.jpg', Golem:'golem.jpg', Spectre:'spectre.jpg', Troll:'troll.jpg'
  };

  // ─────────────────────────────────────────────────────────
  //  World state
  // ─────────────────────────────────────────────────────────
  let W = {
    tick: 0, year: 1,
    totalKills: 0, totalDeaths: 0, totalLoot: 0, totalBattles: 0,
    heroes: [], enemies: [], log: []
  };

  let speed = 2, paused = false;
  let lastTime = 0, accumulator = 0;
  let saveStatus = 'loading...';
  // Combat event queue for visual effects: { heroName, type: 'hero-hit'|'enemy-hit', tick }
  let combatEvents = [];

  // ─────────────────────────────────────────────────────────
  //  Helpers
  // ─────────────────────────────────────────────────────────
  function rng(n)  { return Math.floor(Math.random() * n); }
  function rngf()  { return Math.random(); }
  function pick(a) { return a[rng(a.length)]; }
  function firstName(h) { return h.name.split(' ')[0]; }

  function era() {
    return W.year < 10  ? 'Age of Shadow'
         : W.year < 25  ? 'Age of Blood'
         : W.year < 50  ? 'Age of Ash'
         :                 'Age of Ruin';
  }

  // ─────────────────────────────────────────────────────────
  //  Persistence
  // ─────────────────────────────────────────────────────────
  async function loadFromServer() {
    try {
      const res = await fetch('/api/state');
      const data = await res.json();
      if (data && data.tick !== undefined) {
        // Restore world — strip runtime-only fields
        W.tick          = data.tick          || 0;
        W.year          = data.year          || 1;
        W.totalKills    = data.totalKills    || 0;
        W.totalDeaths   = data.totalDeaths   || 0;
        W.totalLoot     = data.totalLoot     || 0;
        W.totalBattles  = data.totalBattles  || 0;
        W.heroes        = (data.heroes  || []).map(restoreHero);
        W.enemies       = (data.enemies || []).map(restoreEnemy);
        W.log           = data.log || [];
        setSaveStatus(data.savedAt ? `saved ${timeAgo(data.savedAt)}` : 'new world');
      } else {
        setSaveStatus('new world');
      }
    } catch (e) {
      setSaveStatus('offline');
    }
    repopulate();
    renderAll();
  }

  function restoreHero(h) {
    return Object.assign({
      name: 'Unknown', hp: 10, maxhp: 10, atk: 3,
      xp: 0, level: 1, loot: 0, kills: 0,
      color: '#7060d0', state: 'explore', target: null,
      stateTimer: 0, isBlonde: false, fleeCount: 0,
      image: pick(HERO_IMAGES)
    }, h, { target: null, engagedBy: null });
  }

  function restoreEnemy(e) {
    return Object.assign({
      name: 'Skeleton', hp: 8, maxhp: 15, atk: 2,
      xpReward: 5, state: 'patrol', engagedBy: null
    }, e, { engagedBy: null });
  }

  async function saveToServer() {
    try {
      // Sanitise before sending — strip circular refs (target/engagedBy)
      const payload = {
        tick:         W.tick,
        year:         W.year,
        totalKills:   W.totalKills,
        totalDeaths:  W.totalDeaths,
        totalLoot:    W.totalLoot,
        totalBattles: W.totalBattles,
        heroes: W.heroes.map(h => ({
          name: h.name, hp: h.hp, maxhp: h.maxhp, atk: h.atk,
          xp: h.xp, level: h.level, loot: h.loot, kills: h.kills,
          color: h.color, state: h.state === 'hunt' ? 'explore' : h.state,
          stateTimer: h.stateTimer, isBlonde: h.isBlonde, fleeCount: h.fleeCount,
          image: h.image
        })),
        enemies: W.enemies.map(e => ({
          name: e.name, hp: e.hp, maxhp: e.maxhp, atk: e.atk,
          xpReward: e.xpReward, state: e.state
        })),
        log: W.log.slice(0, 40)
      };
      const res = await fetch('/api/state', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      setSaveStatus(`saved ${timeAgo(data.savedAt)}`);
    } catch (e) {
      setSaveStatus('save failed');
    }
  }

  async function resetWorld() {
    try {
      const res = await fetch('/api/reset', { method: 'POST' });
      const fresh = await res.json();
      W.tick = 0; W.year = 1;
      W.totalKills = 0; W.totalDeaths = 0; W.totalLoot = 0; W.totalBattles = 0;
      W.heroes = []; W.enemies = []; W.log = [];
      addLog('The world has been unmade. All begins anew.', 'explore');
      repopulate();
      renderAll();
      setSaveStatus('reset');
    } catch(e) {
      setSaveStatus('reset failed');
    }
  }

  function setSaveStatus(msg) {
    saveStatus = msg;
    const el = document.getElementById('save-status');
    if (el) el.textContent = msg;
  }

  function timeAgo(isoStr) {
    if (!isoStr) return 'just now';
    const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
    if (diff < 5)   return 'just now';
    if (diff < 60)  return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    return `${Math.floor(diff/3600)}h ago`;
  }

  // ─────────────────────────────────────────────────────────
  //  Spawn
  // ─────────────────────────────────────────────────────────
  function spawnHero(forceBlonde) {
    let isBlonde = forceBlonde === true;
    // Assign an image not already taken by a living hero
    const usedImages = new Set(W.heroes.map(h => h.image));
    const availImages = HERO_IMAGES.filter(i => !usedImages.has(i));
    const image = availImages.length ? pick(availImages) : pick(HERO_IMAGES);
    W.heroes.push({
      name:      isBlonde ? 'Kael the Stranger' : HERO_NAMES[rng(HERO_NAMES.length)] + ' ' + pick(HERO_TITLES),
      hp:        isBlonde ? 35 : 20 + rng(10),
      maxhp:     isBlonde ? 35 : 30,
      atk:       isBlonde ? 6  : 3 + rng(4),
      xp: 0, level: 1, loot: 0, kills: 0,
      color:     isBlonde ? '#e8b830' : HERO_COLORS[rng(HERO_COLORS.length)],
      state: 'explore', target: null, stateTimer: 0,
      isBlonde, fleeCount: 0, image
    });
  }

  function spawnEnemy() {
    // Weight spawns toward weaker enemies early, stronger ones as years pass
    const tierCap = Math.min(4, 1 + Math.floor(W.year / 6));
    const pool = ENEMY_NAMES.filter(n => ENEMY_STATS[n].tier <= tierCap);
    const name = pick(pool);
    const s = ENEMY_STATS[name];
    const hp = s.hp[0] + rng(s.hp[1] - s.hp[0] + 1);
    W.enemies.push({
      name,
      hp, maxhp: hp,
      atk: s.atk[0] + rng(s.atk[1] - s.atk[0] + 1),
      xpReward: s.xp[0] + rng(s.xp[1] - s.xp[0] + 1),
      tier: s.tier,
      state: 'patrol', engagedBy: null
    });
  }

  function repopulate() {
    if (!W.heroes.some(h => h.isBlonde)) spawnHero(true);
    while (W.heroes.length < 4) spawnHero(false);
    while (W.enemies.length < 6 + Math.floor(W.year / 4)) spawnEnemy();
  }

  // ─────────────────────────────────────────────────────────
  //  Log
  // ─────────────────────────────────────────────────────────
  function addLog(msg, type) {
    W.log.unshift({ msg, type, t: W.year });
    if (W.log.length > 40) W.log.pop();
  }

  // ─────────────────────────────────────────────────────────
  //  Simulation
  // ─────────────────────────────────────────────────────────
  function updateHero(h) {
    h.stateTimer--;
    if (h.state === 'explore') {
      if (h.stateTimer <= 0) h.stateTimer = 20 + rng(30);
      if (rngf() < 0.003) {
        h.loot++; W.totalLoot++; h.maxhp += 2;
        if (rngf() < 0.4) h.atk++;
        addLog(`${firstName(h)} found a ${pick(LOOT_NAMES)}!`, 'loot');
      }
      let target = W.enemies.find(e => e.hp > 0 && !e.engagedBy);
      if (target && rngf() < 0.12) {
        h.state = 'hunt'; h.target = target; target.engagedBy = h;
        h.stateTimer = 40 + rng(20);
      }
    } else if (h.state === 'hunt') {
      if (!h.target || h.target.hp <= 0 || h.stateTimer <= 0) {
        if (h.target) h.target.engagedBy = null;
        h.state = 'explore'; h.target = null; h.stateTimer = 20 + rng(20);
        return;
      }
      if (rngf() < 0.4) {
        let dmg = h.atk + rng(3);
        h.target.hp -= dmg;
        combatEvents.push({ heroName: h.name, type: 'enemy-hit', tick: W.tick });
        if (h.target.hp <= 0) {
          const tier = h.target.tier || 1;
          const suffix = tier >= 4 ? ' — a mighty victory!' : tier === 3 ? ' — a hard-won fight.' : '!';
          addLog(`${firstName(h)} slew ${h.target.name}${suffix}`, 'combat');
          h.xp += h.target.xpReward; h.kills++; W.totalKills++; W.totalBattles++;
          W.enemies = W.enemies.filter(e => e !== h.target);
          h.state = 'explore'; h.target = null; h.stateTimer = 15;
          if (h.xp >= h.level * 15) {
            h.level++; h.xp -= h.level * 15;
            h.maxhp += 5 + rng(5); h.hp = Math.min(h.hp + 10, h.maxhp); h.atk++;
            addLog(`${firstName(h)} reached Level ${h.level}!`, 'level');
          }
        }
      }
      if (h.target && rngf() < 0.3) {
        let dmg = h.target.atk + rng(2);
        h.hp -= dmg;
        combatEvents.push({ heroName: h.name, type: 'hero-hit', tick: W.tick });
        if (h.hp <= 0) {
          addLog(h.isBlonde ? 'Kael the Stranger has fallen!' : `${firstName(h)} fell to ${h.target.name}...`, 'death');
          W.totalDeaths++;
          if (h.target) h.target.engagedBy = null;
          W.heroes = W.heroes.filter(x => x !== h);
        } else if (h.hp < h.maxhp * 0.25 && !h.isBlonde) {
          h.fleeCount++;
          addLog(`${firstName(h)} flees from ${h.target.name}!`, 'explore');
          if (h.target) h.target.engagedBy = null;
          h.state = 'flee'; h.target = null; h.stateTimer = 20 + rng(15);
        }
      }
    } else if (h.state === 'flee') {
      h.hp = Math.min(h.hp + 1, h.maxhp);
      if (h.stateTimer <= 0) { h.state = 'explore'; h.stateTimer = 20; }
    }
  }

  // ─────────────────────────────────────────────────────────
  //  Render
  // ─────────────────────────────────────────────────────────
  // ── icon maps ──────────────────────────────────────────────
  const ENEMY_ICONS = {
    Skeleton:'💀', Ghoul:'🧟', Spider:'🕷', Shade:'👤',
    Golem:'🗿', Spectre:'👻', Troll:'👹'
  };
  const LOG_ICONS = {
    combat:'⚔', loot:'✦', level:'★', death:'†', explore:'◈'
  };

  // ── Rank system ────────────────────────────────────────────
  const RANKS = [
    { minLevel: 1,  name: 'Initiate',    badge: '◌', color: '#7060a0' },
    { minLevel: 3,  name: 'Wanderer',    badge: '◈', color: '#6080b0' },
    { minLevel: 5,  name: 'Veteran',     badge: '✦', color: '#50a070' },
    { minLevel: 8,  name: 'Champion',    badge: '❖', color: '#b8901a' },
    { minLevel: 12, name: 'Warlord',     badge: '⚔', color: '#c04020' },
    { minLevel: 17, name: 'Deathlord',   badge: '☠', color: '#902090' },
    { minLevel: 23, name: 'Archon',      badge: '✸', color: '#cc2244' },
    { minLevel: 30, name: 'Undying',     badge: '★', color: '#e8b830' },
  ];

  function getRank(level) {
    let rank = RANKS[0];
    for (let r of RANKS) { if (level >= r.minLevel) rank = r; else break; }
    return rank;
  }

  function getNextRank(level) {
    for (let r of RANKS) { if (r.minLevel > level) return r; }
    return null;
  }

  // ── Selected hero ──────────────────────────────────────────
  let selectedHeroName = null;

  function renderAll() {
    processCombatEvents();
    renderHeroes();
    renderThreats();
    renderStats();
    renderLog();
    updateEra();
    if (selectedHeroName) {
      const h = W.heroes.find(h => h.name === selectedHeroName);
      if (h) {
        // Only do a full rebuild if the panel isn't already showing this hero
        const panel = document.getElementById('hero-detail');
        if (!panel || !panel.querySelector(`[data-hero="${h.name}"]`)) {
          renderHeroDetail(h);
        } else {
          patchHeroDetail(h); // fast in-place update, no blink
        }
      } else {
        closeHeroDetail();
      }
    }
  }

  function renderHeroes() {
    const el = document.getElementById('heroes-grid');
    if (!el) return;
    if (!W.heroes.length) {
      el.innerHTML = '<div style="color:#9070a8;font-size:13px;padding:8px 0;">No heroes remain in the world...</div>';
      return;
    }
    el.innerHTML = W.heroes.map(h => {
      const pct      = Math.max(0, h.hp / h.maxhp);
      const bar      = pct > 0.6 ? '#3a9a3a' : pct > 0.3 ? '#aaaa22' : '#aa2222';
      const xpPct    = Math.min(1, h.xp / (h.level * 15));
      const stateKey = h.state === 'hunt' ? 'hunt' : h.state === 'flee' ? 'flee' : 'explore';
      const stateLabel = stateKey === 'hunt' ? '⚔ Hunting' : stateKey === 'flee' ? '↪ Fleeing' : '◈ Exploring';
      const stateClass = stateKey === 'hunt' ? 'tag-state-hunt' : stateKey === 'flee' ? 'tag-state-flee' : 'tag-state-explore';
      const cardClass  = h.isBlonde ? 'blonde' : stateKey === 'hunt' ? 'hunting' : stateKey === 'flee' ? 'fleeing' : 'exploring';
      const rank       = getRank(h.level);
      const isSelected = h.name === selectedHeroName;
      return `<div class="hero-card ${cardClass}${isSelected ? ' selected' : ''}" data-name="${h.name}" onclick="selectHero('${h.name.replace(/'/g,"\\'")}')">
        ${h.image ? `<img class="hero-card-img" src="${h.image}" alt="${h.name}">` : ''}
        <div class="hero-card-top">
          <div class="hero-avatar" style="background:${h.color}22;border-color:${h.color}55;color:${h.color};">${h.isBlonde ? '★' : h.name[0]}</div>
          <div class="hero-info">
            <div class="hero-name ${h.isBlonde ? 'blonde' : ''}">${h.name}</div>
            <div class="hero-tags">
              <span class="tag tag-level">Lv ${h.level}</span>
              <span class="tag tag-rank" style="color:${rank.color};border-color:${rank.color}44;background:${rank.color}11;">${rank.badge} ${rank.name}</span>
              <span class="tag ${stateClass}">${stateLabel}</span>
            </div>
          </div>
        </div>
        <div class="hero-hp-label">${h.hp} / ${h.maxhp} hp</div>
        <div class="hp-track"><div class="hp-fill" style="width:${Math.round(pct*100)}%;background:${bar};"></div></div>
        <div class="hp-track" style="height:3px;margin-bottom:10px;"><div class="hp-fill" style="width:${Math.round(xpPct*100)}%;background:#2255aa;opacity:0.7;"></div></div>
        <div class="hero-stats">
          <div class="stat-chip"><span class="val">${h.atk}</span><span class="lbl">ATK</span></div>
          <div class="stat-chip"><span class="val">${h.kills}</span><span class="lbl">Kills</span></div>
          <div class="stat-chip"><span class="val">${h.loot}</span><span class="lbl">Loot</span></div>
          <div class="stat-chip"><span class="val">${h.level * 15 - h.xp}</span><span class="lbl">XP left</span></div>
        </div>
      </div>`;
    }).join('');
  }

  // ── Hero detail panel ──────────────────────────────────────
  window.selectHero = function(name) {
    if (selectedHeroName === name) { closeHeroDetail(); return; }
    selectedHeroName = name;
    const h = W.heroes.find(h => h.name === name);
    if (h) renderHeroDetail(h);
    renderHeroes(); // re-render cards to update selected state
  };

  function closeHeroDetail() {
    selectedHeroName = null;
    const panel = document.getElementById('hero-detail');
    if (panel) panel.innerHTML = '';
    renderHeroes();
  }

  function renderHeroDetail(h) {
    const panel = document.getElementById('hero-detail');
    if (!panel) return;

    const rank      = getRank(h.level);
    const nextRank  = getNextRank(h.level);
    const pct       = Math.max(0, h.hp / h.maxhp);
    const hpBar     = pct > 0.6 ? '#3a9a3a' : pct > 0.3 ? '#aaaa22' : '#aa2222';
    const xpPct     = Math.min(1, h.xp / (h.level * 15));
    const stateKey  = h.state === 'hunt' ? 'hunt' : h.state === 'flee' ? 'flee' : 'explore';
    const stateLabel= stateKey === 'hunt' ? '⚔ Hunting' : stateKey === 'flee' ? '↪ Fleeing' : '◈ Exploring';
    const stateClass= stateKey === 'hunt' ? 'tag-state-hunt' : stateKey === 'flee' ? 'tag-state-flee' : 'tag-state-explore';

    // Build rank progression strip
    const rankStrip = RANKS.map(r => {
      const done    = h.level >= r.minLevel;
      const current = rank.name === r.name;
      return `<div class="rank-pip ${done ? 'done' : ''} ${current ? 'current' : ''}" style="${current ? `border-color:${rank.color};color:${rank.color};` : ''}">
        <span class="rank-pip-badge">${r.badge}</span>
        <span class="rank-pip-name">${r.name}</span>
        <span class="rank-pip-lvl">Lv${r.minLevel}</span>
      </div>`;
    }).join('');

    // Hero's personal log entries
    const heroLog = W.log.filter(l => l.msg.startsWith(h.name.split(' ')[0])).slice(0, 6);
    const logHtml = heroLog.length
      ? heroLog.map(l => `<div class="log-entry ${l.type}"><span class="log-yr">Yr${l.t}</span><span class="log-icon">${LOG_ICONS[l.type]||'◈'}</span><span class="log-msg">${l.msg}</span></div>`).join('')
      : `<div style="color:var(--text-lo);font-size:12px;padding:4px 0;">No entries yet.</div>`;

    panel.innerHTML = `
      <div class="detail-inner" data-hero="${h.name}">
        <button class="detail-close" onclick="window.selectHero('${h.name.replace(/'/g,"\\'")}')">✕ Close</button>

        <div class="detail-header">
          <div class="detail-avatar" style="background:${h.color}22;border-color:${h.color}88;color:${h.color};">
            ${h.isBlonde ? '★' : h.name[0]}
          </div>
          <div class="detail-identity">
            <div class="detail-name ${h.isBlonde ? 'blonde' : ''}">${h.name}${h.isBlonde ? ' ★' : ''}</div>
            <div class="detail-rank-line" style="color:${rank.color};">${rank.badge} ${rank.name} &nbsp;·&nbsp; Level ${h.level}</div>
            <div class="detail-tags">
              <span class="tag ${stateClass} patch-state-tag">${stateLabel}</span>
              <span class="tag tag-state-hunt patch-target-tag" style="${h.target ? '' : 'display:none;'}">vs ${h.target ? h.target.name : ''}</span>
            </div>
          </div>
        </div>

        ${h.state === 'hunt' && h.target ? `
        <div class="arena-section patch-arena-section">
          <div class="arena-section-label">In Combat</div>
          <div class="combat-arena">
            <div class="arena-fighter arena-hero-fighter">
              <img class="arena-hero-img" src="${h.image || 'character.gif'}" alt="${h.name}">
              <div class="arena-hp-bar">
                <div class="arena-hp-fill patch-arena-hero-hp" style="width:${Math.round(Math.max(0,h.hp/h.maxhp)*100)}%;background:${h.hp/h.maxhp>0.5?'#3a9a3a':h.hp/h.maxhp>0.25?'#aaaa22':'#aa2222'};"></div>
              </div>
              <div class="arena-fighter-label">${h.name}</div>
            </div>
            <div class="arena-vs"><span>VS</span></div>
            <div class="arena-fighter arena-enemy-fighter">
              <img class="arena-enemy-img" src="${ENEMY_IMAGES[h.target.name] || ''}" alt="${h.target.name}">
              <div class="arena-hp-bar">
                <div class="arena-hp-fill patch-arena-enemy-hp" style="width:${Math.round(Math.max(0,h.target.hp/h.target.maxhp)*100)}%;background:#882233;"></div>
              </div>
              <div class="arena-fighter-label">${h.target.name}</div>
            </div>
          </div>
        </div>` : `<div class="patch-arena-section" style="display:none;"></div>`}

        <div class="detail-body">

          <div class="detail-col">
            <div class="detail-section-label">Vitals</div>
            <div class="detail-bar-row">
              <span class="detail-bar-label">HP</span>
              <div class="hp-track" style="flex:1;"><div class="hp-fill patch-hp-fill" style="width:${Math.round(pct*100)}%;background:${hpBar};"></div></div>
              <span class="detail-bar-val patch-hp-val">${h.hp} / ${h.maxhp}</span>
            </div>
            <div class="detail-bar-row">
              <span class="detail-bar-label">XP</span>
              <div class="hp-track" style="flex:1;"><div class="hp-fill patch-xp-fill" style="width:${Math.round(xpPct*100)}%;background:#3366bb;"></div></div>
              <span class="detail-bar-val patch-xp-val">${h.xp} / ${h.level * 15}</span>
            </div>
            ${nextRank ? `<div class="detail-next-rank">Next rank: <span style="color:${nextRank.color};">${nextRank.badge} ${nextRank.name}</span> at Lv ${nextRank.minLevel}</div>` : `<div class="detail-next-rank" style="color:var(--gold);">★ Maximum rank achieved</div>`}

            <div class="detail-section-label" style="margin-top:14px;">Combat Stats</div>
            <div class="detail-stat-grid">
              <div class="detail-stat"><span class="dsv patch-stat-atk">${h.atk}</span><span class="dsl">Attack</span></div>
              <div class="detail-stat"><span class="dsv patch-stat-kills">${h.kills}</span><span class="dsl">Kills</span></div>
              <div class="detail-stat"><span class="dsv patch-stat-loot">${h.loot}</span><span class="dsl">Relics</span></div>
              <div class="detail-stat"><span class="dsv patch-stat-retreats">${h.fleeCount}</span><span class="dsl">Retreats</span></div>
              <div class="detail-stat"><span class="dsv patch-stat-level">${h.level}</span><span class="dsl">Level</span></div>
              <div class="detail-stat"><span class="dsv patch-stat-maxhp">${h.maxhp}</span><span class="dsl">Max HP</span></div>
            </div>
          </div>

          <div class="detail-col">
            <div class="detail-section-label">Rank Progression</div>
            <div class="rank-strip">${rankStrip}</div>

            <div class="detail-section-label" style="margin-top:14px;">Personal Chronicle</div>
            <div class="detail-log patch-detail-log" data-count="${heroLog.length}">${logHtml}</div>
          </div>

        </div>
      </div>`;
  }

  // Patch only the live-changing parts of the detail panel — no innerHTML rebuild, no blink
  function patchHeroDetail(h) {
    const panel = document.getElementById('hero-detail');
    if (!panel) return;

    const pct    = Math.max(0, h.hp / h.maxhp);
    const hpBar  = pct > 0.6 ? '#3a9a3a' : pct > 0.3 ? '#aaaa22' : '#aa2222';
    const xpPct  = Math.min(1, h.xp / (h.level * 15));
    const stateKey   = h.state === 'hunt' ? 'hunt' : h.state === 'flee' ? 'flee' : 'explore';
    const stateLabel = stateKey === 'hunt' ? '⚔ Hunting' : stateKey === 'flee' ? '↪ Fleeing' : '◈ Exploring';
    const stateClass = stateKey === 'hunt' ? 'tag-state-hunt' : stateKey === 'flee' ? 'tag-state-flee' : 'tag-state-explore';

    function set(id, text) { const el = panel.querySelector(id); if (el) el.textContent = text; }
    function style(id, prop, val) { const el = panel.querySelector(id); if (el) el.style[prop] = val; }

    // HP bar
    const hpFill = panel.querySelector('.patch-hp-fill');
    if (hpFill) { hpFill.style.width = Math.round(pct * 100) + '%'; hpFill.style.background = hpBar; }
    set('.patch-hp-val', `${h.hp} / ${h.maxhp}`);

    // XP bar
    const xpFill = panel.querySelector('.patch-xp-fill');
    if (xpFill) xpFill.style.width = Math.round(xpPct * 100) + '%';
    set('.patch-xp-val', `${h.xp} / ${h.level * 15}`);

    // State tag
    const stateTag = panel.querySelector('.patch-state-tag');
    if (stateTag) { stateTag.textContent = stateLabel; stateTag.className = `tag ${stateClass} patch-state-tag`; }

    // Target tag
    const targetTag = panel.querySelector('.patch-target-tag');
    if (targetTag) {
      if (h.target) { targetTag.textContent = `vs ${h.target.name}`; targetTag.style.display = ''; }
      else { targetTag.style.display = 'none'; }
    }

    // Stat values
    set('.patch-stat-atk',      h.atk);
    set('.patch-stat-kills',    h.kills);
    set('.patch-stat-loot',     h.loot);
    set('.patch-stat-retreats', h.fleeCount);
    set('.patch-stat-level',    h.level);
    set('.patch-stat-maxhp',    h.maxhp);

    // Combat arena — show/hide + update HP bars
    const arenaSection = panel.querySelector('.patch-arena-section');
    if (arenaSection) {
      if (h.state === 'hunt' && h.target) {
        // If arena not built yet, do a full rebuild (hero just entered combat)
        if (arenaSection.style.display === 'none' || !arenaSection.querySelector('.combat-arena')) {
          const heroHpPct = Math.max(0, h.hp / h.maxhp);
          const eneHpPct  = Math.max(0, h.target.hp / h.target.maxhp);
          arenaSection.style.display = '';
          arenaSection.innerHTML = `
            <div class="arena-section-label">In Combat</div>
            <div class="combat-arena">
              <div class="arena-fighter arena-hero-fighter">
                <img class="arena-hero-img" src="${h.image || 'character.gif'}" alt="${h.name}">
                <div class="arena-hp-bar">
                  <div class="arena-hp-fill patch-arena-hero-hp" style="width:${Math.round(heroHpPct*100)}%;background:${heroHpPct>0.5?'#3a9a3a':heroHpPct>0.25?'#aaaa22':'#aa2222'};"></div>
                </div>
                <div class="arena-fighter-label">${h.name}</div>
              </div>
              <div class="arena-vs"><span>VS</span></div>
              <div class="arena-fighter arena-enemy-fighter">
                <img class="arena-enemy-img" src="${ENEMY_IMAGES[h.target.name] || ''}" alt="${h.target.name}">
                <div class="arena-hp-bar">
                  <div class="arena-hp-fill patch-arena-enemy-hp" style="width:${Math.round(eneHpPct*100)}%;background:#882233;"></div>
                </div>
                <div class="arena-fighter-label">${h.target.name}</div>
              </div>
            </div>`;
        } else {
          // Just update HP fills
          const heroHpPct = Math.max(0, h.hp / h.maxhp);
          const eneHpPct  = Math.max(0, h.target.hp / h.target.maxhp);
          const heroFill  = arenaSection.querySelector('.patch-arena-hero-hp');
          const eneFill   = arenaSection.querySelector('.patch-arena-enemy-hp');
          if (heroFill) {
            heroFill.style.width = Math.round(heroHpPct * 100) + '%';
            heroFill.style.background = heroHpPct > 0.5 ? '#3a9a3a' : heroHpPct > 0.25 ? '#aaaa22' : '#aa2222';
          }
          if (eneFill) eneFill.style.width = Math.round(eneHpPct * 100) + '%';
        }
      } else {
        arenaSection.style.display = 'none';
        arenaSection.innerHTML = '';
      }
    }

    // Re-render personal log only when new entries exist (compare count)
    const logEl = panel.querySelector('.patch-detail-log');
    if (logEl) {
      const heroLog = W.log.filter(l => l.msg.startsWith(h.name.split(' ')[0])).slice(0, 6);
      const newCount = heroLog.length;
      const oldCount = parseInt(logEl.dataset.count || '0');
      if (newCount !== oldCount) {
        logEl.dataset.count = newCount;
        logEl.innerHTML = newCount
          ? heroLog.map(l => `<div class="log-entry ${l.type}"><span class="log-yr">Yr${l.t}</span><span class="log-icon">${LOG_ICONS[l.type]||'◈'}</span><span class="log-msg">${l.msg}</span></div>`).join('')
          : `<div style="color:var(--text-lo);font-size:12px;padding:4px 0;">No entries yet.</div>`;
      }
    }
  }

  // ── Process combat events → fire visual effects on detail panel ──
  function processCombatEvents() {
    if (!combatEvents.length) return;
    const panel = document.getElementById('hero-detail');
    if (!panel) { combatEvents = []; return; }

    // Only fire effects if the selected hero's panel is showing
    const events = combatEvents.splice(0, combatEvents.length);
    if (!selectedHeroName) return;

    const heroImg  = panel.querySelector('.arena-hero-img');
    const enemyImg = panel.querySelector('.arena-enemy-img');
    const heroFighter  = panel.querySelector('.arena-hero-fighter');
    const enemyFighter = panel.querySelector('.arena-enemy-fighter');
    if (!heroImg || !enemyImg) return;

    for (const ev of events) {
      if (ev.heroName !== selectedHeroName) continue;

      if (ev.type === 'hero-hit') {
        // Hero takes damage: red/purple flash + shake left
        triggerFlash(heroImg, 'hit-hero');
        triggerShake(heroFighter, 'shake-hero');
      } else if (ev.type === 'enemy-hit') {
        // Enemy takes damage: yellow flash + shake right
        triggerFlash(enemyImg, 'hit-enemy');
        triggerShake(enemyFighter, 'shake-enemy');
      }
    }
  }

  function triggerFlash(el, cls) {
    if (!el) return;
    el.classList.remove(cls);
    // force reflow so re-adding the class restarts the animation
    void el.offsetWidth;
    el.classList.add(cls);
    el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
  }

  function triggerShake(el, cls) {
    if (!el) return;
    el.classList.remove(cls);
    void el.offsetWidth;
    el.classList.add(cls);
    el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
  }

  function renderThreats() {
    const el = document.getElementById('threats-list');
    if (!el) return;
    const counts = {};
    for (let e of W.enemies) counts[e.name] = (counts[e.name] || 0) + 1;
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const maxCnt = sorted[0] ? sorted[0][1] : 1;
    let html = sorted.map(([name, cnt]) => {
      const s = ENEMY_STATS[name];
      const tierStars = s ? '◆'.repeat(s.tier) + '◇'.repeat(4 - s.tier) : '◇◇◇◇';
      const tierColor = s ? ['','#7060a0','#50a070','#b8901a','#c04020'][s.tier] : '#7060a0';
      const xpRange   = s ? `${s.xp[0]}–${s.xp[1]} xp` : '';
      return `<div class="threat-row">
        <span class="threat-icon">${ENEMY_ICONS[name] || '👾'}</span>
        <span class="threat-name">${name}</span>
        <span class="threat-tier" style="color:${tierColor};" title="Tier ${s ? s.tier : '?'}">${tierStars}</span>
        <span class="threat-xp">${xpRange}</span>
        <div class="threat-bar-wrap">
          <div class="threat-bar-track"><div class="threat-bar-fill" style="width:${Math.round(cnt/maxCnt*100)}%"></div></div>
        </div>
        <span class="threat-count">×${cnt}</span>
      </div>`;
    }).join('');
    if (!W.enemies.length) html = '<div style="color:#9070a8;font-size:13px;padding:6px 0;">None lurking...</div>';
    html += `<div class="threat-footer">
      <div class="mini-stat"><span class="mv">${W.enemies.length}</span><span class="ml">Total</span></div>
      <div class="mini-stat"><span class="mv">${W.enemies.filter(e => e.engagedBy).length}</span><span class="ml">In battle</span></div>
      <div class="mini-stat"><span class="mv">${W.enemies.filter(e => !e.engagedBy).length}</span><span class="ml">Roaming</span></div>
    </div>`;
    el.innerHTML = html;
  }

  function renderStats() {
    const el = document.getElementById('stats-list');
    if (!el) return;
    const top = W.heroes.slice().sort((a, b) => b.kills - a.kills)[0];
    const rows = [
      ['Year',          W.year,         ''],
      ['Era',           era(),          ''],
      ['Monsters slain', W.totalKills,  ''],
      ['Heroes lost',   W.totalDeaths,  ''],
      ['Relics found',  W.totalLoot,    ''],
      ['Battles fought',W.totalBattles, ''],
      ['Living heroes', W.heroes.length,''],
    ];
    if (top) rows.push(['Champion', `${firstName(top)} (${top.kills})`, 'highlight']);
    el.innerHTML = rows.map(([label, val, cls]) =>
      `<div class="world-stat-row">
        <span class="ws-label">${label}</span>
        <span class="ws-val ${cls}">${val}</span>
      </div>`
    ).join('');
  }

  function renderLog() {
    const el = document.getElementById('log-lines');
    if (!el) return;
    el.innerHTML = W.log.slice(0, 14).map(l =>
      `<div class="log-entry ${l.type}">
        <span class="log-yr">Yr${l.t}</span>
        <span class="log-icon">${LOG_ICONS[l.type] || '◈'}</span>
        <span class="log-msg">${l.msg}</span>
      </div>`
    ).join('');
  }

  function updateEra() {
    const el = document.getElementById('era-display');
    if (el) el.textContent = `Year ${W.year} — ${era()}`;
  }

  // ─────────────────────────────────────────────────────────
  //  Main loop
  // ─────────────────────────────────────────────────────────
  function loop(ts) {
    requestAnimationFrame(loop);
    if (!lastTime) lastTime = ts;
    const dt = ts - lastTime; lastTime = ts;
    if (paused) return;
    accumulator += dt * speed;
    while (accumulator >= STEP_MS) {
      accumulator -= STEP_MS;
      W.tick++;
      for (let h of [...W.heroes]) updateHero(h);
      if (W.tick % 80  === 0) repopulate();
      if (W.tick % 600 === 0) {
        W.year++;
        addLog(`Year ${W.year} begins. New threats stir in the dark.`, 'explore');
        for (let i = 0; i < 2; i++) spawnEnemy();
        updateEra();
      }
      if (W.tick % SAVE_INTERVAL_TICKS === 0) saveToServer();
      if (W.tick % 10 === 0) renderAll();
    }
  }

  // ─────────────────────────────────────────────────────────
  //  Controls
  // ─────────────────────────────────────────────────────────
  function setSpeed(s) {
    speed = s; paused = false;
    document.querySelectorAll('#controls button:not(.danger)').forEach(b => b.classList.remove('active'));
  }
  document.getElementById('btn-slow').onclick  = function() { setSpeed(1); this.classList.add('active'); };
  document.getElementById('btn-med').onclick   = function() { setSpeed(2); this.classList.add('active'); };
  document.getElementById('btn-fast').onclick  = function() { setSpeed(4); this.classList.add('active'); };
  document.getElementById('btn-pause').onclick = function() {
    paused = !paused;
    document.querySelectorAll('#controls button:not(.danger)').forEach(b => b.classList.remove('active'));
    if (paused) this.classList.add('active');
    else document.getElementById('btn-med').classList.add('active');
  };

  // Reset modal
  document.getElementById('btn-reset').onclick    = () => document.getElementById('reset-modal').classList.add('open');
  document.getElementById('modal-cancel').onclick  = () => document.getElementById('reset-modal').classList.remove('open');
  document.getElementById('modal-confirm').onclick = async () => {
    document.getElementById('reset-modal').classList.remove('open');
    await resetWorld();
  };

  // Save on page unload
  window.addEventListener('beforeunload', () => { saveToServer(); });

  // ─────────────────────────────────────────────────────────
  //  Boot
  // ─────────────────────────────────────────────────────────
  loadFromServer().then(() => requestAnimationFrame(loop));
})();
</script>
</body>
</html>
