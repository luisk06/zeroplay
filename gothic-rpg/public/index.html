<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gothic RPG — Zero Player</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=IM+Fell+English&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #060008;
      --bg-panel:  #0c000f;
      --bg-card:   #110015;
      --bg-card2:  #0e0012;
      --border:    #2a1040;
      --border2:   #1a0830;
      --purple:    #9a60c8;
      --purple-dim:#7a4a9a;
      --gold:      #e8b830;
      --gold-dim:  #8a6010;
      --red:       #cc4444;
      --red-dim:   #661020;
      --green:     #44aa55;
      --yellow:    #bbaa22;
      --blue:      #4488cc;
      --text-hi:   #e8d8f8;
      --text-mid:  #c0a0e0;
      --text-lo:   #9070a8;
      --text-dim:  #6a4888;
    }

    body {
      background: var(--bg);
      font-family: 'Courier New', monospace;
      color: var(--text-mid);
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    #app {
      max-width: 980px;
      margin: 0 auto;
      border: 1px solid var(--border);
      background: var(--bg-panel);
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #08000c;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }
    #title-block { display: flex; flex-direction: column; gap: 2px; }
    #title-block h1 {
      font-size: 15px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--purple);
      font-weight: normal;
    }
    #era-display {
      font-size: 11px;
      color: var(--text-mid);
      letter-spacing: 1px;
    }

    /* Speed controls */
    #controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    #controls .label {
      font-size: 10px;
      color: var(--text-mid);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-right: 2px;
    }
    #controls button {
      background: #150020;
      border: 1px solid var(--border);
      color: var(--text-mid);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 4px 13px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.12s, color 0.12s;
    }
    #controls button:hover  { background: #200030; color: var(--text-mid); }
    #controls button.active { background: #2e1050; color: var(--text-hi); border-color: var(--purple-dim); }
    #controls button.danger { border-color: #501010; color: #aa3333; }
    #controls button.danger:hover { background: #1e0808; color: var(--red); }

    #save-status {
      font-size: 10px;
      color: var(--text-lo);
      margin-left: 4px;
      letter-spacing: 1px;
    }

    /* ── Main layout: heroes full-width top, then 2-col bottom ── */
    #heroes-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border2);
    }
    #bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border2);
    }
    #threats-section {
      padding: 16px 20px;
      border-right: 1px solid var(--border2);
    }
    #stats-section {
      padding: 16px 20px;
    }

    /* Section titles */
    .section-title {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-mid);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 3px; height: 12px;
      background: var(--purple);
      border-radius: 1px;
    }

    /* ── Search bar ── */
    #hero-search-wrap {
      margin-bottom: 12px;
      position: relative;
    }
    #hero-search {
      width: 100%; background: #0a000e; border: 1px solid var(--border2);
      color: var(--text-hi); font-family: 'Courier New', monospace;
      font-size: 12px; padding: 7px 12px 7px 30px; outline: none;
      letter-spacing: 0.5px;
    }
    #hero-search:focus { border-color: var(--purple-dim); }
    #hero-search-wrap::before {
      content: '⚔'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      font-size: 11px; color: var(--text-dim); pointer-events: none;
    }

    /* ── Hero cards ── */
    #heroes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .hero-card {
      background: var(--bg-card);
      border: 1px solid var(--border2);
      padding: 0;
      position: relative;
      transition: border-color 0.2s;
      overflow: hidden;
      cursor: pointer;
    }
    .hero-card.hunting  { border-color: #5a1a1a; }
    .hero-card.fleeing  { border-color: #1a2a5a; }
    .hero-card.blonde   { border-color: #5a4010; }
    .hero-card.wounded  { border-color: #4a2a00; }

    /* accent stripe on left edge */
    .hero-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 0;
    }
    .hero-card.hunting::before  { background: var(--red); opacity: 0.6; }
    .hero-card.fleeing::before  { background: var(--blue); opacity: 0.6; }
    .hero-card.exploring::before { background: var(--purple-dim); opacity: 0.4; }
    .hero-card.blonde::before   { background: var(--gold); opacity: 0.7; }
    .hero-card.wounded::before  { background: #aa6600; opacity: 0.7; }

    /* Card image area */
    .hero-card-img-wrap {
      position: relative; width: 100%; height: 160px; overflow: hidden;
    }
    .hero-card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: top center;
      display: block; filter: brightness(0.82) saturate(0.9);
      transition: filter 0.2s;
    }
    .hero-card:hover .hero-card-img-wrap img { filter: brightness(0.95) saturate(1); }
    .hero-card-img-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 10px 8px;
      background: linear-gradient(transparent, rgba(6,0,8,0.92));
    }
    .hero-card-viewers {
      position: absolute; top: 8px; right: 8px;
      font-size: 9px; letter-spacing: 1px; color: #88ccff;
      background: rgba(0,0,0,0.6); padding: 2px 6px; border: 1px solid #1a3060;
    }

    /* ── Ownership badge ── */
    .hero-card-mine {
      position: absolute; top: 8px; left: 8px;
      font-size: 9px; letter-spacing: 1px; color: #e8b830;
      background: rgba(0,0,0,0.75); padding: 2px 7px;
      border: 1px solid #6a4010;
    }
    /* Owner strip inside detail panel */
    .owner-strip {
      background: #0e0010; border: 1px solid #4a2060;
      padding: 12px 14px; margin-bottom: 14px;
    }
    .owner-strip-title {
      font-size: 9px; letter-spacing: 3px; color: var(--gold);
      text-transform: uppercase; margin-bottom: 10px;
    }
    .owner-motto-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .owner-motto-input {
      flex: 1; background: #080010; border: 1px solid #3a1a50;
      color: var(--text-hi); font-family: 'Courier New', monospace;
      font-size: 12px; padding: 6px 9px; outline: none;
    }
    .owner-motto-input:focus { border-color: var(--purple-dim); }
    .owner-btn {
      background: #150025; border: 1px solid var(--border); color: var(--text-mid);
      font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 1px;
      padding: 6px 14px; cursor: pointer; text-transform: uppercase;
      transition: background 0.12s;
    }
    .owner-btn:hover { background: #200035; color: var(--text-hi); }
    .owner-btn.retire { border-color: #5a1515; color: #aa3333; }
    .owner-btn.retire:hover { background: #1e0808; color: var(--red); }
    .owner-msg { font-size: 10px; color: var(--green); letter-spacing: 1px; min-height: 14px; margin-top: 4px; opacity: 0; transition: opacity 0.3s; }
    .owner-msg.show { opacity: 1; }
    .owner-msg.error { color: var(--red); }
    /* Daily viewer gauge */
    .daily-gauge-wrap { margin-bottom: 14px; }
    .daily-gauge-label { font-size: 9px; letter-spacing: 2px; color: var(--text-lo); text-transform: uppercase; margin-bottom: 5px; display: flex; justify-content: space-between; }
    .daily-gauge-track { height: 6px; background: #1a0828; border-radius: 1px; overflow: hidden; }
    .daily-gauge-fill  { height: 100%; border-radius: 1px; transition: width 0.6s; background: #4a2a80; }
    .daily-gauge-fill.done { background: #44aa55; }

    /* Card body */
    .hero-card-body { padding: 10px 12px 12px; }

    .hero-card-top {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }
    .hero-avatar {
      width: 28px; height: 28px;
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .hero-info { flex: 1; min-width: 0; }
    .hero-name {
      font-size: 13px; color: var(--text-hi);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px; letter-spacing: 0.5px;
    }
    .hero-name.blonde { color: var(--gold); }
    .hero-tags { display: flex; gap: 4px; flex-wrap: wrap; }

    /* View hero button */
    .btn-view-hero {
      display: block; width: 100%; margin-top: 10px;
      background: #130020; border: 1px solid var(--purple-dim);
      color: var(--purple); font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      padding: 7px 0; text-align: center; cursor: pointer; text-decoration: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 8px #7a4a9a22;
    }
    .btn-view-hero:hover {
      background: #1e0838; color: #c080f0; border-color: #b070e0;
      box-shadow: 0 0 14px #9a60c844;
    }
    .tag {
      font-size: 9px;
      letter-spacing: 1px;
      padding: 1px 6px;
      border: 1px solid;
      text-transform: uppercase;
    }
    .tag-level  { color: #b090e0; border-color: #3a2060; background: #180828; }
    .tag-state-hunt    { color: #e05555; border-color: #5a1515; background: #1a0808; }
    .tag-state-flee    { color: #55aaee; border-color: #153060; background: #080818; }
    .tag-state-explore { color: #66bb77; border-color: #154020; background: #081008; }
    .tag-state-wounded { color: #cc8822; border-color: #5a3000; background: #1a0c00; }

    /* HP bar */
    .hp-track {
      height: 6px;
      background: #1a0a28;
      border-radius: 1px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.4s ease;
    }

    /* stat chips */
    .hero-stats {
      display: flex;
      gap: 10px;
    }
    .stat-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .stat-chip .val { font-size: 13px; color: var(--text-hi); letter-spacing: 0.5px; }
    .stat-chip .lbl { font-size: 10px; color: var(--text-lo); letter-spacing: 1px; text-transform: uppercase; }

    .hero-hp-label {
      font-size: 11px;
      color: var(--text-mid);
      text-align: right;
      margin-bottom: 4px;
    }

    /* ── Threats ── */
    .threat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border2);
    }
    .threat-row:last-of-type { border-bottom: none; }
    .threat-icon {
      font-size: 14px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .threat-name  { font-size: 13px; color: var(--text-hi); flex: 1; }
    .threat-tier  { font-size: 9px;  letter-spacing: 1px; flex-shrink: 0; }
    .threat-xp    { font-size: 9px;  color: var(--text-lo); width: 52px; text-align: right; flex-shrink: 0; letter-spacing: 0.5px; }
    .threat-bar-wrap { width: 50px; flex-shrink: 0; }
    .threat-bar-track { height: 4px; background: #1a0a28; border-radius: 1px; }
    .threat-bar-fill  { height: 100%; background: #882233; border-radius: 1px; }
    .threat-count { font-size: 13px; color: var(--red); width: 28px; text-align: right; flex-shrink: 0; }

    .threat-footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border2);
      display: flex;
      gap: 16px;
    }
    .mini-stat { display: flex; flex-direction: column; gap: 2px; }
    .mini-stat .mv { font-size: 20px; color: var(--text-hi); line-height: 1; }
    .mini-stat .ml { font-size: 10px; color: var(--text-lo); letter-spacing: 1px; text-transform: uppercase; }

    /* ── World stats ── */
    .world-stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border2);
    }
    .world-stat-row:last-child { border-bottom: none; }
    .ws-label { font-size: 13px; color: var(--text-mid); }
    .ws-val   { font-size: 14px; color: var(--text-hi); letter-spacing: 0.5px; }
    .ws-val.highlight { color: var(--gold); }

    /* ── Chronicle ── */
    #log-section {
      padding: 14px 20px 18px;
    }
    #log-lines { }
    .log-entry {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 5px 0;
      border-bottom: 1px solid #0d000f;
      font-size: 12px;
      line-height: 1.5;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-yr {
      font-size: 10px;
      color: var(--text-lo);
      letter-spacing: 1px;
      flex-shrink: 0;
      min-width: 32px;
    }
    .log-icon { font-size: 12px; flex-shrink: 0; }
    .log-msg  { color: var(--text-mid); flex: 1; }
    .log-entry.combat  .log-msg { color: #e05555; }
    .log-entry.loot    .log-msg { color: #d4aa44; }
    .log-entry.level   .log-msg { color: #5599dd; }
    .log-entry.death   .log-msg { color: #aa3344; }
    .log-entry.explore .log-msg { color: #55aa66; }

    /* ── Map modal ── */
    #map-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 100;
    }
    #map-modal.open { display: flex; }
    #map-inner {
      background: #080010; border: 1px solid var(--purple-dim);
      padding: 20px; max-width: 860px; width: 96%; position: relative;
      max-height: 90vh; overflow-y: auto;
    }
    #map-title {
      font-size: 11px; letter-spacing: 3px; color: var(--purple); text-transform: uppercase;
      margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border2);
      display: flex; justify-content: space-between; align-items: center;
    }
    #map-close {
      background: none; border: 1px solid var(--border); color: var(--text-lo);
      font-family: 'Courier New', monospace; font-size: 10px; padding: 3px 10px; cursor: pointer; letter-spacing: 1px;
    }
    #map-close:hover { background: #1a0828; color: var(--text-mid); }

    /* ── Combat arena ── */
    .combat-arena {
      display: flex;
      align-items: stretch;
      gap: 0;
      margin: 14px 0 10px;
      background: #080010;
      border: 1px solid #2a0a40;
      overflow: hidden;
      min-height: 180px;
    }
    .arena-fighter {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .arena-fighter img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      object-position: top center;
      display: block;
      filter: brightness(0.8) saturate(0.85);
      transition: filter 0.1s;
    }
    .arena-fighter-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 4px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      font-size: 10px;
      color: var(--text-mid);
      letter-spacing: 1px;
      text-align: center;
    }
    .arena-vs {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      flex-shrink: 0;
      background: #0e0018;
      border-left: 1px solid #2a0a40;
      border-right: 1px solid #2a0a40;
    }
    .arena-vs span {
      font-size: 11px;
      color: var(--purple-dim);
      letter-spacing: 2px;
      writing-mode: vertical-rl;
      text-transform: uppercase;
    }
    .arena-hp-bar {
      position: absolute;
      bottom: 22px; left: 6px; right: 6px;
      height: 4px;
      background: rgba(0,0,0,0.5);
      border-radius: 2px;
    }
    .arena-hp-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ── Hit effect keyframes ── */
    @keyframes hero-flash-hit {
      0%   { filter: brightness(0.8) saturate(0.85); }
      15%  { filter: brightness(2.2) saturate(0.2) sepia(1) hue-rotate(300deg); }
      100% { filter: brightness(0.8) saturate(0.85); }
    }
    @keyframes enemy-flash-hit {
      0%   { filter: brightness(0.8) saturate(0.85); }
      15%  { filter: brightness(2.5) saturate(0.1) sepia(1) hue-rotate(60deg); }
      100% { filter: brightness(0.8) saturate(0.85); }
    }
    .hit-hero  { animation: hero-flash-hit  0.35s ease-out forwards; }
    .hit-enemy { animation: enemy-flash-hit 0.35s ease-out forwards; }

    /* ── Rank tag ── */
    .tag-rank { font-size: 9px; letter-spacing: 1px; padding: 1px 6px; border: 1px solid; text-transform: uppercase; }

    /* ── Hero card selected state ── */
    .hero-card { cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .hero-card:hover { border-color: #3a2060 !important; }
    .hero-card.selected { box-shadow: 0 0 0 2px var(--purple-dim); }

    /* ── Hero detail panel ── */
    #hero-detail { }
    .detail-inner {
      margin-top: 12px;
      background: #0e0018;
      border: 1px solid var(--purple-dim);
      padding: 18px 20px 20px;
      position: relative;
      animation: slideDown 0.18s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .detail-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: 1px solid var(--border);
      color: var(--text-lo); font-family: 'Courier New', monospace;
      font-size: 10px; padding: 3px 10px; cursor: pointer;
      letter-spacing: 1px;
    }
    .detail-close:hover { background: #1a0828; color: var(--text-mid); }

    .detail-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border2);
    }
    .detail-avatar {
      width: 56px; height: 56px; border-radius: 2px; border: 2px solid;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .detail-identity { flex: 1; min-width: 0; }
    .detail-name {
      font-size: 18px; color: var(--text-hi);
      letter-spacing: 1px; margin-bottom: 4px;
    }
    .detail-name.blonde { color: var(--gold); }
    .detail-rank-line { font-size: 13px; margin-bottom: 6px; letter-spacing: 1px; }
    .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .detail-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .detail-col { min-width: 0; }
    .detail-section-label {
      font-size: 9px; letter-spacing: 3px; color: var(--purple-dim);
      text-transform: uppercase; margin-bottom: 10px;
      border-bottom: 1px solid var(--border2); padding-bottom: 4px;
    }

    .detail-bar-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .detail-bar-label { font-size: 10px; color: var(--text-lo); width: 20px; flex-shrink: 0; letter-spacing: 1px; }
    .detail-bar-val   { font-size: 10px; color: var(--text-mid); width: 60px; text-align: right; flex-shrink: 0; }

    .detail-next-rank {
      font-size: 11px; color: var(--text-lo); margin-top: 4px; letter-spacing: 0.5px;
    }

    .detail-stat-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .detail-stat {
      background: var(--bg-card2); border: 1px solid var(--border2);
      padding: 8px 6px; text-align: center; border-radius: 0;
    }
    .dsv { display: block; font-size: 18px; color: var(--text-hi); line-height: 1.2; }
    .dsl { display: block; font-size: 9px;  color: var(--text-lo); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* Rank strip */
    .rank-strip {
      display: flex; flex-direction: column; gap: 4px;
    }
    .rank-pip {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 8px;
      border: 1px solid var(--border2);
      background: var(--bg-card2);
      opacity: 0.45;
    }
    .rank-pip.done    { opacity: 0.7; }
    .rank-pip.current { opacity: 1; background: #150020; }
    .rank-pip-badge { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
    .rank-pip-name  { font-size: 11px; color: var(--text-mid); flex: 1; }
    .rank-pip-lvl   { font-size: 9px;  color: var(--text-dim); letter-spacing: 1px; }
    .rank-pip.current .rank-pip-name { color: var(--text-hi); }
    .rank-pip.current .rank-pip-lvl  { color: var(--text-lo); }

    .detail-log { }

    /* ── Arena shake animation ── */
    @keyframes shake-hero {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(6px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }
    @keyframes shake-enemy {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(8px); }
      40%  { transform: translateX(-6px); }
      60%  { transform: translateX(4px); }
      80%  { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }
    .arena-fighter { transform-origin: center; }
    .shake-hero  { animation: shake-hero  0.32s ease-out; }
    .shake-enemy { animation: shake-enemy 0.32s ease-out; }

    /* ── Arena section wrapper ── */
    .arena-section {
      margin: 0 0 16px;
    }
    .arena-section-label {
      font-size: 9px; letter-spacing: 3px; color: var(--red);
      text-transform: uppercase; margin-bottom: 8px;
      border-bottom: 1px solid #3a0a18; padding-bottom: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .arena-section-label::before {
      content: '⚔'; font-size: 10px;
    }

    /* ── Reset modal ── */
    #reset-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #reset-modal.open { display: flex; }
    .modal-box {
      background: #0e0015;
      border: 1px solid #5a1a7a;
      padding: 28px 32px;
      max-width: 340px;
      width: 92%;
      text-align: center;
    }
    .modal-box h2 {
      font-size: 13px; color: var(--red);
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 12px; font-weight: normal;
    }
    .modal-box p {
      font-size: 12px; color: var(--text-mid);
      margin-bottom: 22px; line-height: 1.7;
    }
    .modal-box .btn-row { display: flex; gap: 12px; justify-content: center; }
    .modal-box button {
      background: #150020; border: 1px solid var(--border);
      color: var(--text-mid); font-family: 'Courier New', monospace;
      font-size: 11px; padding: 6px 20px; cursor: pointer;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .modal-box button.confirm { border-color: #6a1a1a; color: var(--red); }
    .modal-box button:hover { background: #200030; }
    .modal-box button.confirm:hover { background: #1e0808; }
  </style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="title-block">
      <h1>Gothic RPG</h1>
      <span id="era-display">Year 1 — Age of Shadow</span>
    </div>
    <div id="controls">
      <button id="btn-pause" title="Pause your view — world keeps running">&#9646;&#9646; Pause View</button>
      <button id="btn-map" style="border-color:#1a3050;color:#5599cc;">◉ Map</button>
      <button id="btn-join" style="border-color:#3a6a20;color:#66bb77;">⚔ Join the World</button>
      <span id="save-status">loading...</span>
      <span id="viewer-count" style="font-size:10px;color:var(--text-lo);letter-spacing:1px;margin-left:6px;"></span>
    </div>
  </div>

  <!-- Heroes row -->
  <div id="heroes-section">
    <div class="section-title">Heroes</div>
    <div id="hero-search-wrap">
      <input id="hero-search" type="text" placeholder="Search hero by name..." autocomplete="off">
    </div>
    <div id="heroes-grid"></div>
    <div id="hero-detail"></div>
  </div>

  <!-- Threats + Stats -->
  <div id="bottom-row">
    <div id="threats-section">
      <div class="section-title">Active Threats</div>
      <div id="threats-list"></div>
    </div>
    <div id="stats-section">
      <div class="section-title">World Stats</div>
      <div id="stats-list"></div>
    </div>
  </div>

  <!-- Chronicle -->
  <div id="log-section">
    <div class="section-title">Chronicle</div>
    <div id="log-lines"></div>
  </div>

</div>

<!-- Map modal -->
<div id="map-modal">
  <div id="map-inner">
    <div id="map-title">
      <span>◉ World Map — Hero Locations</span>
      <button id="map-close">✕ Close</button>
    </div>
    <div id="map-svg-wrap"></div>
  </div>
</div>

<!-- Join the World modal -->
<div id="join-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);align-items:center;justify-content:center;z-index:100;">
  <div class="modal-box" style="border-color:#2a5a18;max-width:360px;">
    <h2 style="color:#66bb77;letter-spacing:3px;">JOIN THE WORLD</h2>
    <p style="margin-bottom:18px;">A new soul will enter the realm and take their place among the living heroes.</p>
    <p style="font-size:12px;color:var(--text-lo);margin-bottom:6px;letter-spacing:1px;">Quick verification — answer to continue:</p>
    <p id="join-question" style="font-size:16px;color:var(--text-hi);margin-bottom:12px;letter-spacing:1px;"></p>
    <input id="join-answer" type="number" placeholder="Your answer"
      style="width:100%;background:#080010;border:1px solid #2a4020;color:var(--text-hi);
             font-family:'Courier New',monospace;font-size:14px;padding:8px 12px;
             margin-bottom:16px;outline:none;box-sizing:border-box;">
    <p id="join-error" style="color:var(--red);font-size:11px;margin-bottom:12px;min-height:16px;letter-spacing:1px;"></p>
    <div class="btn-row">
      <button id="join-cancel" style="border-color:var(--border);color:var(--text-mid);">Cancel</button>
      <button id="join-confirm" style="border-color:#2a5a18;color:#66bb77;">Enter the World</button>
    </div>
  </div>
</div>

<!-- Join success toast -->
<div id="join-toast" style="display:none;position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:#0e0018;border:1px solid #3a6a20;color:#88dd66;
  font-family:'Courier New',monospace;font-size:12px;padding:12px 24px;
  letter-spacing:1px;z-index:200;text-align:center;"></div>

<script>
(function () {
  // ─────────────────────────────────────────────────────────
  //  Constants (display-only — no simulation here)
  // ─────────────────────────────────────────────────────────
  const ENEMY_NAMES  = ['Skeleton','Ghoul','Spider','Shade','Golem','Spectre','Troll'];
  const ENEMY_STATS  = {
    Skeleton: { hp:[22,34],  atk:[2,3], xp:[4,7],   tier:1 },
    Spider:   { hp:[26,38],  atk:[2,4], xp:[6,9],   tier:1 },
    Ghoul:    { hp:[34,50],  atk:[3,5], xp:[8,12],  tier:2 },
    Shade:    { hp:[38,56],  atk:[3,5], xp:[10,14], tier:2 },
    Spectre:  { hp:[48,68],  atk:[4,6], xp:[13,17], tier:3 },
    Golem:    { hp:[60,86],  atk:[5,7], xp:[16,22], tier:3 },
    Troll:    { hp:[80,110], atk:[6,9], xp:[20,28], tier:4 },
  };

  const ENEMY_IMAGES = {
    Skeleton:'skeleton.jpg', Ghoul:'ghoul.jpg', Spider:'spider.jpg',
    Shade:'shade.jpg', Golem:'golem.jpg', Spectre:'spectre.jpg', Troll:'troll.jpg'
  };

  // ─────────────────────────────────────────────────────────
  //  World state (display only — populated from server SSE)
  // ─────────────────────────────────────────────────────────
  let W = { tick:0, year:1, era:'Age of Shadow', totalKills:0, totalDeaths:0, totalLoot:0, totalBattles:0, heroes:[], enemies:[], log:[], speed:2, paused:false };
  let combatEvents = [];

  function firstName(h) { return h.name.split(' ')[0]; }

  function setSaveStatus(msg) {
    const el = document.getElementById('save-status');
    if (el) el.textContent = msg;
  }

  function setViewerCount(n) {
    const el = document.getElementById('viewer-count');
    if (el) el.textContent = n === 1 ? '● 1 viewer' : `● ${n} viewers`;
  }

  // ─────────────────────────────────────────────────────────
  //  SSE connection
  // ─────────────────────────────────────────────────────────
  function connectSSE() {
    const es = new EventSource('/api/stream');
    es.onopen = () => setSaveStatus('live ●');
    es.onerror = () => { setSaveStatus('reconnecting...'); setTimeout(connectSSE, 3000); es.close(); };
    es.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') {
        if (viewerPaused) {
          // Buffer the latest world but don't render
          pendingWorld = msg.world;
          if (msg.combatEvents && msg.combatEvents.length) combatEvents.push(...msg.combatEvents);
        } else {
          W = msg.world;
          if (msg.combatEvents && msg.combatEvents.length) combatEvents.push(...msg.combatEvents);
          renderAll();
          syncControls(W.speed, W.paused);
          setViewerCount(W.viewers || 0);
        }
      } else if (msg.type === 'control') {
        if (!viewerPaused) syncControls(msg.speed, msg.paused);
      } else if (msg.type === 'viewers') {
        setViewerCount(msg.viewers || 0);
      }
    };
  }

  function syncControls(speed, paused) {
    // Viewer has no speed buttons — nothing to sync server-side state to
  }

  // ─────────────────────────────────────────────────────────
  //  Render
  // ─────────────────────────────────────────────────────────
  // ── icon maps ──────────────────────────────────────────────
  const ENEMY_ICONS = {
    Skeleton:'💀', Ghoul:'🧟', Spider:'🕷', Shade:'👤',
    Golem:'🗿', Spectre:'👻', Troll:'👹'
  };
  const LOG_ICONS = {
    combat:'⚔', loot:'✦', level:'★', death:'†', explore:'◈'
  };

  // ── Rank system ────────────────────────────────────────────
  const RANKS = [
    { minLevel: 1,  name: 'Initiate',    badge: '◌', color: '#7060a0' },
    { minLevel: 3,  name: 'Wanderer',    badge: '◈', color: '#6080b0' },
    { minLevel: 5,  name: 'Veteran',     badge: '✦', color: '#50a070' },
    { minLevel: 8,  name: 'Champion',    badge: '❖', color: '#b8901a' },
    { minLevel: 12, name: 'Warlord',     badge: '⚔', color: '#c04020' },
    { minLevel: 17, name: 'Deathlord',   badge: '☠', color: '#902090' },
    { minLevel: 23, name: 'Archon',      badge: '✸', color: '#cc2244' },
    { minLevel: 30, name: 'Undying',     badge: '★', color: '#e8b830' },
  ];

  function getRank(level) {
    let rank = RANKS[0];
    for (let r of RANKS) { if (level >= r.minLevel) rank = r; else break; }
    return rank;
  }

  function getNextRank(level) {
    for (let r of RANKS) { if (r.minLevel > level) return r; }
    return null;
  }

  // ── Selected hero ──────────────────────────────────────────
  let selectedHeroName = null;

  // Slug helpers — "Iron Wolf" → "iron-wolf"
  function slugify(name) { return name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }

  // ── Hero ownership (localStorage claim token) ─────────────
  const CLAIM_KEY = 'gothic-rpg-claim';
  function getClaim() {
    try { return JSON.parse(localStorage.getItem(CLAIM_KEY)) || null; } catch { return null; }
  }
  function setClaim(heroName, claimToken) {
    localStorage.setItem(CLAIM_KEY, JSON.stringify({ heroName, claimToken, createdAt: Date.now() }));
  }
  function clearClaim() { localStorage.removeItem(CLAIM_KEY); }
  function isMyHero(heroName) { const c = getClaim(); return c && c.heroName === heroName; }

  function renderAll() {
    processCombatEvents();
    renderHeroes();
    renderThreats();
    renderStats();
    renderLog();
    updateEra();
    if (selectedHeroName) {
      const h = W.heroes.find(h => h.name === selectedHeroName);
      if (h) {
        // Only do a full rebuild if the panel isn't already showing this hero
        const panel = document.getElementById('hero-detail');
        if (!panel || !panel.querySelector(`[data-hero="${h.name}"]`)) {
          renderHeroDetail(h);
        } else {
          patchHeroDetail(h); // fast in-place update, no blink
        }
      } else {
        closeHeroDetail();
      }
    }
  }

  function renderHeroes() {
    const el = document.getElementById('heroes-grid');
    if (!el) return;
    const query = (document.getElementById('hero-search')?.value || '').toLowerCase().trim();
    const heroes = query ? W.heroes.filter(h => h.name.toLowerCase().includes(query)) : W.heroes;
    if (!heroes.length) {
      el.innerHTML = `<div style="color:#9070a8;font-size:13px;padding:8px 0;">${query ? 'No heroes match your search.' : 'No heroes remain in the world...'}</div>`;
      return;
    }
    el.innerHTML = heroes.map(h => {
      const pct      = Math.max(0, h.hp / h.maxhp);
      const bar      = pct > 0.6 ? '#3a9a3a' : pct > 0.3 ? '#aaaa22' : '#aa2222';
      const xpPct    = Math.min(1, h.xp / (h.level * 15));
      const stateKey = h.state === 'hunt' ? 'hunt' : h.state === 'flee' ? 'flee' : h.state === 'wounded' ? 'wounded' : 'explore';
      const stateLabel = stateKey === 'hunt' ? '⚔ Hunting' : stateKey === 'flee' ? '↪ Fleeing' : stateKey === 'wounded' ? '✞ Wounded' : '◈ Exploring';
      const stateClass = stateKey === 'hunt' ? 'tag-state-hunt' : stateKey === 'flee' ? 'tag-state-flee' : stateKey === 'wounded' ? 'tag-state-wounded' : 'tag-state-explore';
      const cardClass  = h.isBlonde ? 'blonde' : stateKey === 'hunt' ? 'hunting' : stateKey === 'flee' ? 'fleeing' : stateKey === 'wounded' ? 'wounded' : 'exploring';
      const rank       = getRank(h.level);
      const isSelected = h.name === selectedHeroName;
      const viewers    = h.heroViewers || 0;
      const heroUrl    = `/hero?name=${slugify(h.name)}`;
      return `<div class="hero-card ${cardClass}${isSelected ? ' selected' : ''}" data-name="${h.name}">
        <div class="hero-card-img-wrap" onclick="selectHero('${h.name.replace(/'/g,"\\'")}')">
          ${h.image ? `<img src="${h.image}" alt="${h.name}">` : ''}
          <div class="hero-card-img-overlay">
            <div class="hero-name ${h.isBlonde ? 'blonde' : ''}" style="font-size:14px;margin-bottom:4px;">${h.name}${h.isBlonde ? ' ★' : ''}</div>
            <div class="hero-tags">
              <span class="tag tag-rank" style="color:${rank.color};border-color:${rank.color}44;background:${rank.color}22;">${rank.badge} ${rank.name}</span>
              <span class="tag ${stateClass}">${stateLabel}</span>
            </div>
          </div>
          ${isMyHero(h.name) ? `<div class="hero-card-mine">★ Your Hero</div>` : ''}
          ${viewers > 0 ? `<div class="hero-card-viewers">● ${viewers} watching</div>` : ''}
        </div>
        <div class="hero-card-body">
          <div class="hero-hp-label" style="margin-bottom:4px;">${h.hp} / ${h.maxhp} hp</div>
          <div class="hp-track"><div class="hp-fill" style="width:${Math.round(pct*100)}%;background:${bar};"></div></div>
          <div class="hp-track" style="height:3px;margin-bottom:10px;"><div class="hp-fill" style="width:${Math.round(xpPct*100)}%;background:#2255aa;opacity:0.7;"></div></div>
          <div class="hero-stats">
            <div class="stat-chip"><span class="val" style="color:#9a60c8;">Lv${h.level}</span><span class="lbl">Level</span></div>
            <div class="stat-chip"><span class="val">${h.atk}</span><span class="lbl">ATK</span></div>
            <div class="stat-chip"><span class="val">${h.kills}</span><span class="lbl">Kills</span></div>
            <div class="stat-chip"><span class="val" style="${(h.falls||0)>0?'color:#cc8822;':''}">${h.falls||0}</span><span class="lbl">Falls</span></div>
          </div>
          <a class="btn-view-hero" href="${heroUrl}" target="_blank" onclick="event.stopPropagation()">◈ View Hero Page</a>
        </div>
      </div>`;
    }).join('');
  }

  // ── Hero detail panel ──────────────────────────────────────
  window.selectHero = function(name) {
    if (selectedHeroName === name) { closeHeroDetail(); return; }
    selectedHeroName = name;
    const h = W.heroes.find(h => h.name === name);
    if (h) renderHeroDetail(h);
    renderHeroes(); // re-render cards to update selected state
  };

  function closeHeroDetail() {
    selectedHeroName = null;
    const panel = document.getElementById('hero-detail');
    if (panel) panel.innerHTML = '';
    renderHeroes();
  }

  function renderHeroDetail(h) {
    const panel = document.getElementById('hero-detail');
    if (!panel) return;

    const rank      = getRank(h.level);
    const nextRank  = getNextRank(h.level);
    const pct       = Math.max(0, h.hp / h.maxhp);
    const hpBar     = pct > 0.6 ? '#3a9a3a' : pct > 0.3 ? '#aaaa22' : '#aa2222';
    const xpPct     = Math.min(1, h.xp / (h.level * 15));
    const stateKey  = h.state === 'hunt' ? 'hunt' : h.state === 'flee' ? 'flee' : h.state === 'wounded' ? 'wounded' : 'explore';
    const stateLabel= stateKey === 'hunt' ? '⚔ Hunting' : stateKey === 'flee' ? '↪ Fleeing' : stateKey === 'wounded' ? '✞ Wounded' : '◈ Exploring';
    const stateClass= stateKey === 'hunt' ? 'tag-state-hunt' : stateKey === 'flee' ? 'tag-state-flee' : stateKey === 'wounded' ? 'tag-state-wounded' : 'tag-state-explore';

    // Build rank progression strip
    const rankStrip = RANKS.map(r => {
      const done    = h.level >= r.minLevel;
      const current = rank.name === r.name;
      return `<div class="rank-pip ${done ? 'done' : ''} ${current ? 'current' : ''}" style="${current ? `border-color:${rank.color};color:${rank.color};` : ''}">
        <span class="rank-pip-badge">${r.badge}</span>
        <span class="rank-pip-name">${r.name}</span>
        <span class="rank-pip-lvl">Lv${r.minLevel}</span>
      </div>`;
    }).join('');

    // Hero's personal log entries
    const heroLog = W.log.filter(l => l.msg.startsWith(h.name.split(' ')[0])).slice(0, 6);
    const logHtml = heroLog.length
      ? heroLog.map(l => `<div class="log-entry ${l.type}"><span class="log-yr">Yr${l.t}</span><span class="log-icon">${LOG_ICONS[l.type]||'◈'}</span><span class="log-msg">${l.msg}</span></div>`).join('')
      : `<div style="color:var(--text-lo);font-size:12px;padding:4px 0;">No entries yet.</div>`;

    panel.innerHTML = `
      <div class="detail-inner" data-hero="${h.name}">
        <button class="detail-close" onclick="window.selectHero('${h.name.replace(/'/g,"\\'")}')">✕ Close</button>

        <div class="detail-header">
          <div class="detail-avatar" style="background:${h.color}22;border-color:${h.color}88;color:${h.color};">
            ${h.isBlonde ? '★' : h.name[0]}
          </div>
          <div class="detail-identity">
            <div class="detail-name ${h.isBlonde ? 'blonde' : ''}">${h.name}${h.isBlonde ? ' ★' : ''}</div>
            <div class="detail-rank-line" style="color:${rank.color};">${rank.badge} ${rank.name} &nbsp;·&nbsp; Level ${h.level}</div>
            <div class="detail-tags">
              <span class="tag ${stateClass} patch-state-tag">${stateLabel}</span>
              <span class="tag tag-state-hunt patch-target-tag" style="${h.target ? '' : 'display:none;'}">vs ${h.target ? h.target.name : ''}</span>
            </div>
          </div>
        </div>

        ${h.state === 'hunt' && h.target ? `
        <div class="arena-section patch-arena-section">
          <div class="arena-section-label">In Combat</div>
          <div class="combat-arena">
            <div class="arena-fighter arena-hero-fighter">
              <img class="arena-hero-img" src="${h.image || 'character.gif'}" alt="${h.name}">
              <div class="arena-hp-bar">
                <div class="arena-hp-fill patch-arena-hero-hp" style="width:${Math.round(Math.max(0,h.hp/h.maxhp)*100)}%;background:${h.hp/h.maxhp>0.5?'#3a9a3a':h.hp/h.maxhp>0.25?'#aaaa22':'#aa2222'};"></div>
              </div>
              <div class="arena-fighter-label">${h.name}</div>
            </div>
            <div class="arena-vs"><span>VS</span></div>
            <div class="arena-fighter arena-enemy-fighter">
              <img class="arena-enemy-img" src="${ENEMY_IMAGES[h.target.name] || ''}" alt="${h.target.name}">
              <div class="arena-hp-bar">
                <div class="arena-hp-fill patch-arena-enemy-hp" style="width:${Math.round(Math.max(0,h.target.hp/h.target.maxhp)*100)}%;background:#882233;"></div>
              </div>
              <div class="arena-fighter-label">${h.target.name}</div>
            </div>
          </div>
        </div>` : `<div class="patch-arena-section" style="display:none;"></div>`}

        ${isMyHero(h.name) ? (() => {
          const dvSec  = h.dailyViewSeconds || 0;
          const dvGoal = h.dailyViewGoal || 300;
          const dvPct  = Math.min(100, Math.round(dvSec / dvGoal * 100));
          const dvMin  = Math.floor(dvSec / 60), dvS = dvSec % 60;
          const dvDone = dvSec >= dvGoal;
          return `
        <div class="owner-strip" id="owner-strip">
          <div class="owner-strip-title">★ Your Hero</div>

          <div class="daily-gauge-wrap">
            <div class="daily-gauge-label">
              <span>Daily presence — ${dvDone ? '✓ fulfilled' : 'keep page open'}</span>
              <span>${dvMin}m ${dvS}s / 5m</span>
            </div>
            <div class="daily-gauge-track">
              <div class="daily-gauge-fill ${dvDone ? 'done' : ''}" id="owner-daily-fill" style="width:${dvPct}%;"></div>
            </div>
          </div>

          <div class="owner-motto-row">
            <input class="owner-motto-input" id="owner-rename" type="text" maxlength="32"
              placeholder="Rename hero…" value="${h.name.replace(/"/g,'&quot;')}">
            <button class="owner-btn" onclick="renameHero('${h.name.replace(/'/g,"\\'")}')">Rename</button>
          </div>
          <div class="owner-motto-row">
            <input class="owner-motto-input" id="owner-motto" type="text" maxlength="80"

  // Patch only the live-changing parts of the detail panel — no innerHTML rebuild, no blink
  function patchHeroDetail(h) {
    const panel = document.getElementById('hero-detail');
    if (!panel) return;

    const pct    = Math.max(0, h.hp / h.maxhp);
    const hpBar  = pct > 0.6 ? '#3a9a3a' : pct > 0.3 ? '#aaaa22' : '#aa2222';
    const xpPct  = Math.min(1, h.xp / (h.level * 15));
    const stateKey   = h.state === 'hunt' ? 'hunt' : h.state === 'flee' ? 'flee' : h.state === 'wounded' ? 'wounded' : 'explore';
    const stateLabel = stateKey === 'hunt' ? '⚔ Hunting' : stateKey === 'flee' ? '↪ Fleeing' : stateKey === 'wounded' ? '✞ Wounded' : '◈ Exploring';
    const stateClass = stateKey === 'hunt' ? 'tag-state-hunt' : stateKey === 'flee' ? 'tag-state-flee' : stateKey === 'wounded' ? 'tag-state-wounded' : 'tag-state-explore';

    function set(id, text) { const el = panel.querySelector(id); if (el) el.textContent = text; }
    function style(id, prop, val) { const el = panel.querySelector(id); if (el) el.style[prop] = val; }

    // HP bar
    const hpFill = panel.querySelector('.patch-hp-fill');
    if (hpFill) { hpFill.style.width = Math.round(pct * 100) + '%'; hpFill.style.background = hpBar; }
    set('.patch-hp-val', `${h.hp} / ${h.maxhp}`);

    // XP bar
    const xpFill = panel.querySelector('.patch-xp-fill');
    if (xpFill) xpFill.style.width = Math.round(xpPct * 100) + '%';
    set('.patch-xp-val', `${h.xp} / ${h.level * 15}`);

    // State tag
    const stateTag = panel.querySelector('.patch-state-tag');
    if (stateTag) { stateTag.textContent = stateLabel; stateTag.className = `tag ${stateClass} patch-state-tag`; }

    // Target tag
    const targetTag = panel.querySelector('.patch-target-tag');
    if (targetTag) {
      if (h.target) { targetTag.textContent = `vs ${h.target.name}`; targetTag.style.display = ''; }
      else { targetTag.style.display = 'none'; }
    }

    // Stat values
    set('.patch-stat-atk',      h.atk);
    set('.patch-stat-kills',    h.kills);
    set('.patch-stat-loot',     h.loot);
    set('.patch-stat-retreats', h.fleeCount);
    set('.patch-stat-level',    h.level);
    set('.patch-stat-maxhp',    h.maxhp);
    const fallsEl = panel.querySelector('.patch-stat-falls');
    if (fallsEl) { fallsEl.textContent = h.falls||0; fallsEl.style.color = (h.falls||0) > 0 ? '#cc8822' : ''; }

    // Combat arena — show/hide + update HP bars
    const arenaSection = panel.querySelector('.patch-arena-section');
    if (arenaSection) {
      if (h.state === 'hunt' && h.target) {
        // If arena not built yet, do a full rebuild (hero just entered combat)
        if (arenaSection.style.display === 'none' || !arenaSection.querySelector('.combat-arena')) {
          const heroHpPct = Math.max(0, h.hp / h.maxhp);
          const eneHpPct  = Math.max(0, h.target.hp / h.target.maxhp);
          arenaSection.style.display = '';
          arenaSection.innerHTML = `
            <div class="arena-section-label">In Combat</div>
            <div class="combat-arena">
              <div class="arena-fighter arena-hero-fighter">
                <img class="arena-hero-img" src="${h.image || 'character.gif'}" alt="${h.name}">
                <div class="arena-hp-bar">
                  <div class="arena-hp-fill patch-arena-hero-hp" style="width:${Math.round(heroHpPct*100)}%;background:${heroHpPct>0.5?'#3a9a3a':heroHpPct>0.25?'#aaaa22':'#aa2222'};"></div>
                </div>
                <div class="arena-fighter-label">${h.name}</div>
              </div>
              <div class="arena-vs"><span>VS</span></div>
              <div class="arena-fighter arena-enemy-fighter">
                <img class="arena-enemy-img" src="${ENEMY_IMAGES[h.target.name] || ''}" alt="${h.target.name}">
                <div class="arena-hp-bar">
                  <div class="arena-hp-fill patch-arena-enemy-hp" style="width:${Math.round(eneHpPct*100)}%;background:#882233;"></div>
                </div>
                <div class="arena-fighter-label">${h.target.name}</div>
              </div>
            </div>`;
        } else {
          // Just update HP fills
          const heroHpPct = Math.max(0, h.hp / h.maxhp);
          const eneHpPct  = Math.max(0, h.target.hp / h.target.maxhp);
          const heroFill  = arenaSection.querySelector('.patch-arena-hero-hp');
          const eneFill   = arenaSection.querySelector('.patch-arena-enemy-hp');
          if (heroFill) {
            heroFill.style.width = Math.round(heroHpPct * 100) + '%';
            heroFill.style.background = heroHpPct > 0.5 ? '#3a9a3a' : heroHpPct > 0.25 ? '#aaaa22' : '#aa2222';
          }
          if (eneFill) eneFill.style.width = Math.round(eneHpPct * 100) + '%';
        }
      } else {
        arenaSection.style.display = 'none';
        arenaSection.innerHTML = '';
      }
    }

    // Daily gauge patch (owner strip)
    if (isMyHero(h.name)) {
      const dvSec  = h.dailyViewSeconds || 0;
      const dvGoal = h.dailyViewGoal || 300;
      const dvPct  = Math.min(100, Math.round(dvSec / dvGoal * 100));
      const dvDone = dvSec >= dvGoal;
      const dvFill = panel.querySelector('#owner-daily-fill');
      if (dvFill) { dvFill.style.width = dvPct + '%'; dvFill.classList.toggle('done', dvDone); }
      const dvLabel = panel.querySelector('.daily-gauge-label span:last-child');
      if (dvLabel) { const m = Math.floor(dvSec/60), s = dvSec%60; dvLabel.textContent = `${m}m ${s}s / 5m`; }
      const dvTitle = panel.querySelector('.daily-gauge-label span:first-child');
      if (dvTitle) dvTitle.textContent = dvDone ? 'Daily presence — ✓ fulfilled' : 'Daily presence — keep page open';
    }

    // Re-render personal log only when new entries exist (compare count)
    const logEl = panel.querySelector('.patch-detail-log');
    if (logEl) {
      const heroLog = W.log.filter(l => l.msg.startsWith(h.name.split(' ')[0])).slice(0, 6);
      const newCount = heroLog.length;
      const oldCount = parseInt(logEl.dataset.count || '0');
      if (newCount !== oldCount) {
        logEl.dataset.count = newCount;
        logEl.innerHTML = newCount
          ? heroLog.map(l => `<div class="log-entry ${l.type}"><span class="log-yr">Yr${l.t}</span><span class="log-icon">${LOG_ICONS[l.type]||'◈'}</span><span class="log-msg">${l.msg}</span></div>`).join('')
          : `<div style="color:var(--text-lo);font-size:12px;padding:4px 0;">No entries yet.</div>`;
      }
    }
  }

  // ── Process combat events → fire visual effects on detail panel ──
  function processCombatEvents() {
    if (!combatEvents.length) return;
    const panel = document.getElementById('hero-detail');
    if (!panel) { combatEvents = []; return; }

    // Only fire effects if the selected hero's panel is showing
    const events = combatEvents.splice(0, combatEvents.length);
    if (!selectedHeroName) return;

    const heroImg  = panel.querySelector('.arena-hero-img');
    const enemyImg = panel.querySelector('.arena-enemy-img');
    const heroFighter  = panel.querySelector('.arena-hero-fighter');
    const enemyFighter = panel.querySelector('.arena-enemy-fighter');
    if (!heroImg || !enemyImg) return;

    for (const ev of events) {
      if (ev.heroName !== selectedHeroName) continue;

      if (ev.type === 'hero-hit') {
        // Hero takes damage: red/purple flash + shake left
        triggerFlash(heroImg, 'hit-hero');
        triggerShake(heroFighter, 'shake-hero');
      } else if (ev.type === 'enemy-hit') {
        // Enemy takes damage: yellow flash + shake right
        triggerFlash(enemyImg, 'hit-enemy');
        triggerShake(enemyFighter, 'shake-enemy');
      }
    }
  }

  function triggerFlash(el, cls) {
    if (!el) return;
    el.classList.remove(cls);
    // force reflow so re-adding the class restarts the animation
    void el.offsetWidth;
    el.classList.add(cls);
    el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
  }

  function triggerShake(el, cls) {
    if (!el) return;
    el.classList.remove(cls);
    void el.offsetWidth;
    el.classList.add(cls);
    el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
  }

  function renderThreats() {
    const el = document.getElementById('threats-list');
    if (!el) return;
    const counts = {};
    for (let e of W.enemies) counts[e.name] = (counts[e.name] || 0) + 1;
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const maxCnt = sorted[0] ? sorted[0][1] : 1;
    let html = sorted.map(([name, cnt]) => {
      const s = ENEMY_STATS[name];
      const tierStars = s ? '◆'.repeat(s.tier) + '◇'.repeat(4 - s.tier) : '◇◇◇◇';
      const tierColor = s ? ['','#7060a0','#50a070','#b8901a','#c04020'][s.tier] : '#7060a0';
      const xpRange   = s ? `${s.xp[0]}–${s.xp[1]} xp` : '';
      return `<div class="threat-row">
        <span class="threat-icon">${ENEMY_ICONS[name] || '👾'}</span>
        <span class="threat-name">${name}</span>
        <span class="threat-tier" style="color:${tierColor};" title="Tier ${s ? s.tier : '?'}">${tierStars}</span>
        <span class="threat-xp">${xpRange}</span>
        <div class="threat-bar-wrap">
          <div class="threat-bar-track"><div class="threat-bar-fill" style="width:${Math.round(cnt/maxCnt*100)}%"></div></div>
        </div>
        <span class="threat-count">×${cnt}</span>
      </div>`;
    }).join('');
    if (!W.enemies.length) html = '<div style="color:#9070a8;font-size:13px;padding:6px 0;">None lurking...</div>';
    html += `<div class="threat-footer">
      <div class="mini-stat"><span class="mv">${W.enemies.length}</span><span class="ml">Total</span></div>
      <div class="mini-stat"><span class="mv">${W.enemies.filter(e => e.engagedByName).length}</span><span class="ml">In battle</span></div>
      <div class="mini-stat"><span class="mv">${W.enemies.filter(e => !e.engagedByName).length}</span><span class="ml">Roaming</span></div>
    </div>`;
    el.innerHTML = html;
  }

  let joinA = 0, joinB = 0, joinCorrect = 0;

  function openJoinModal() {
    // Generate a simple math question
    joinA = Math.floor(Math.random() * 9) + 1;
    joinB = Math.floor(Math.random() * 9) + 1;
    joinCorrect = joinA + joinB;
    document.getElementById('join-question').textContent = `What is ${joinA} + ${joinB}?`;
    document.getElementById('join-answer').value = '';
    document.getElementById('join-error').textContent = '';
    const modal = document.getElementById('join-modal');
    modal.style.display = 'flex';
    setTimeout(() => document.getElementById('join-answer').focus(), 80);
  }

  function closeJoinModal() {
    document.getElementById('join-modal').style.display = 'none';
  }

  async function submitJoin() {
    const answer = parseInt(document.getElementById('join-answer').value);
    if (answer !== joinCorrect) {
      document.getElementById('join-error').textContent = 'Incorrect — try again.';
      document.getElementById('join-answer').value = '';
      document.getElementById('join-answer').focus();
      // Refresh the question
      joinA = Math.floor(Math.random() * 9) + 1;
      joinB = Math.floor(Math.random() * 9) + 1;
      joinCorrect = joinA + joinB;
      document.getElementById('join-question').textContent = `What is ${joinA} + ${joinB}?`;
      return;
    }
    closeJoinModal();
    try {
      const res  = await fetch('/api/join', { method:'POST', headers:{'Content-Type':'application/json'} });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('join-error').textContent = data.error || 'Could not join.';
        document.getElementById('join-modal').style.display = 'flex';
        return;
      }
      if (data.ok && data.heroName) {
        if (data.claimToken) {
          setClaim(data.heroName, data.claimToken);
          document.getElementById('btn-join').style.display = 'none';
        }
        showJoinToast(data.heroName, !!data.claimToken);
      }
    } catch(e) { /* silent */ }
  }

  function showJoinToast(name, owned) {
    const t = document.getElementById('join-toast');
    t.innerHTML = owned
      ? `⚔ <strong>${name}</strong> has entered the world!<br><span style="font-size:10px;opacity:0.7;letter-spacing:0.5px;">★ You are their keeper. Find them in the world.</span>`
      : `⚔ ${name} has entered the world!`;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 5000);
  }

  window.renameHero = async function(currentName) {
    const claim = getClaim();
    if (!claim || claim.heroName !== currentName) return;
    const newName = (document.getElementById('owner-rename')?.value || '').trim();
    const msgEl = document.getElementById('owner-msg');
    const res = await fetch('/api/hero/rename', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ heroName: currentName, claimToken: claim.claimToken, newName })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      // Update the stored claim with the new name
      setClaim(data.heroName, claim.claimToken);
      selectedHeroName = data.heroName;
      if (msgEl) { msgEl.textContent = `Renamed to ${data.heroName} ✓`; msgEl.className = 'owner-msg show'; setTimeout(() => msgEl.classList.remove('show'), 2500); }
    } else {
      if (msgEl) { msgEl.textContent = data.error || 'Rename failed.'; msgEl.className = 'owner-msg show error'; setTimeout(() => { msgEl.classList.remove('show','error'); }, 2500); }
    }

    const res = await fetch('/api/hero/retire', {

  // Real lat/lon for each hero city (Natural Earth major cities)
  const MAP_LOCATIONS = [
    { name:'Tokyo',     lon:139.6917, lat:35.6895 },
    { name:'Kyoto',     lon:135.7681, lat:35.0116 },
    { name:'Osaka',     lon:135.5023, lat:34.6937 },
    { name:'Sapporo',   lon:141.3544, lat:43.0618 },
    { name:'Nagasaki',  lon:129.8778, lat:32.7503 },
    { name:'Hiroshima', lon:132.4596, lat:34.3853 },
    { name:'Sendai',    lon:140.8694, lat:38.2682 },
    { name:'Nara',      lon:135.8048, lat:34.6851 },
    { name:'Fukuoka',   lon:130.4017, lat:33.5904 },
    { name:'Kanazawa',  lon:136.6256, lat:36.5944 },
  ];

  // Assign heroes to cities deterministically by hero name hash
  function heroLocation(heroName) {
    let hash = 0;
    for (let i = 0; i < heroName.length; i++) hash = (hash * 31 + heroName.charCodeAt(i)) & 0xffff;
    return MAP_LOCATIONS[hash % MAP_LOCATIONS.length];
  }

  // D3 + topojson lazy-loaded once
  let _d3 = null, _topojson = null, _japanGeo = null, _riversGeo = null;

  async function loadMapLibs() {
    if (_d3) return; // already loaded
    // Load D3 and topojson-client as ES modules
    const [d3mod, topomod] = await Promise.all([
      import('https://cdn.jsdelivr.net/npm/d3@7/+esm'),
      import('https://cdn.jsdelivr.net/npm/topojson-client@3/+esm'),
    ]);
    _d3 = d3mod;
    _topojson = topomod;

    // Fetch Natural Earth data
    const [worldTopo, riversTopo] = await Promise.all([
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json()),
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/rivers-110m.json').then(r => r.json()).catch(() => null),
    ]);

    // Japan = ISO 3166 numeric 392
    _japanGeo = _topojson.feature(worldTopo, worldTopo.objects.countries);
    _japanGeo = {
      type: 'FeatureCollection',
      features: _japanGeo.features.filter(f => f.id === '392')
    };

    if (riversTopo && riversTopo.objects) {
      const riverKey = Object.keys(riversTopo.objects)[0];
      _riversGeo = _topojson.feature(riversTopo, riversTopo.objects[riverKey]);
    }
  }

  function openMap() {
    const modal = document.getElementById('map-modal');
    modal.classList.add('open');
    renderMap();
  }

  async function renderMap() {
    const wrap = document.getElementById('map-svg-wrap');
    if (!wrap) return;

    // Show loading state
    wrap.innerHTML = `<div style="color:#6a4888;font-size:11px;letter-spacing:2px;padding:40px;text-align:center;">Loading map data...</div>`;

    try {
      await loadMapLibs();
    } catch(err) {
      wrap.innerHTML = `<div style="color:#cc4444;font-size:11px;letter-spacing:2px;padding:40px;text-align:center;">Map failed to load. Check connection.<br><small style="opacity:0.6">${err.message}</small></div>`;
      return;
    }

    const d3 = _d3;
    const W_SVG = 760, H_SVG = 500;

    // Mercator projection centered on Japan
    const projection = d3.geoMercator()
      .center([137, 37])       // center of Japan (lon, lat)
      .scale(1800)
      .translate([W_SVG / 2, H_SVG / 2]);

    const path = d3.geoPath().projection(projection);

    // ── Build SVG string ──────────────────────────────────

    // Grid overlay (RPG overworld feel)
    const gridLines = [];
    for (let x = 0; x <= W_SVG; x += 40) gridLines.push(`<line x1="${x}" y1="0" x2="${x}" y2="${H_SVG}" stroke="#130a20" stroke-width="0.5"/>`);
    for (let y = 0; y <= H_SVG; y += 40) gridLines.push(`<line x1="0" y1="${y}" x2="${W_SVG}" y2="${y}" stroke="#130a20" stroke-width="0.5"/>`);

    // Japan land path
    let landPath = '';
    if (_japanGeo && _japanGeo.features.length) {
      const d = path(_japanGeo);
      if (d) {
        landPath = `<path d="${d}" fill="#1c0d2e" stroke="#4a2060" stroke-width="1.2" opacity="0.95"/>`;
      }
    }

    // Rivers clipped to Japan bounding box
    let riverPaths = '';
    if (_riversGeo) {
      // Rough Japan bounding box lon/lat: 123-146E, 24-46N
      const japanBbox = [[123,24],[146,46]];
      const clipped = { type:'FeatureCollection', features: _riversGeo.features.filter(f => {
        try {
          // Quick bbox check on first coordinate
          const coords = f.geometry.coordinates;
          if (!coords || !coords.length) return false;
          const [lon, lat] = Array.isArray(coords[0]) ? coords[0] : coords;
          return lon >= japanBbox[0][0] && lon <= japanBbox[1][0] && lat >= japanBbox[0][1] && lat <= japanBbox[1][1];
        } catch { return false; }
      })};
      if (clipped.features.length) {
        const d = path(clipped);
        if (d) riverPaths = `<path d="${d}" fill="none" stroke="#1e3a5f" stroke-width="1.2" opacity="0.7"/>`;
      }
    }

    // Mountain markers — placed in the geo layer so they scale with land
    // (mountains are fixed geography, not interactive — scaling is fine)
    const MOUNTAINS = [
      { name:'Mt. Fuji',    lon:138.7274, lat:35.3606 },
      { name:'Mt. Hotaka',  lon:137.6478, lat:36.2891 },
      { name:'Mt. Yari',    lon:137.6478, lat:36.3417 },
      { name:'Mt. Daisetsu',lon:142.8614, lat:43.6667 },
      { name:'Mt. Kurodake',lon:142.9058, lat:43.7039 },
    ];
    const mountainSvg = MOUNTAINS.map(m => {
      const [px, py] = projection([m.lon, m.lat]);
      if (px < 0 || px > W_SVG || py < 0 || py > H_SVG) return '';
      return `
        <polygon points="${px},${py-10} ${px-7},${py+4} ${px+7},${py+4}"
          fill="none" stroke="#5a3070" stroke-width="1.2" opacity="0.8"/>
        <text x="${px}" y="${py+16}" text-anchor="middle"
          font-size="8" fill="#5a3070" font-family="Courier New" opacity="0.8">${m.name}</text>`;
    }).join('');

    // Pre-compute projected city positions (used both for initial render and zoom updates)
    const heroAtLocation = {};
    (W ? W.heroes || [] : []).forEach(h => {
      const loc = heroLocation(h.name);
      if (!heroAtLocation[loc.name]) heroAtLocation[loc.name] = [];
      heroAtLocation[loc.name].push(h);
    });

    // Each city marker is a <g> with data-cx/cy so the zoom handler can reposition it
    // without scaling — markers always appear at fixed pixel size regardless of zoom level
    const cityMarkerGroups = MAP_LOCATIONS.map(loc => {
      const [px, py] = projection([loc.lon, loc.lat]);
      if (isNaN(px) || isNaN(py)) return '';
      const heroes = heroAtLocation[loc.name] || [];
      const hasHero = heroes.length > 0;
      const dotColor = hasHero ? '#e8b830' : '#4a2a60';
      const dotR = hasHero ? 5.5 : 3;

      // City name label
      const cityLabel = `<text y="-10" text-anchor="middle"
        font-size="9.5" fill="${hasHero ? '#e8d8f8' : '#6a4888'}"
        font-family="Courier New" letter-spacing="0.5" pointer-events="none">${loc.name}</text>`;

      // Hero labels — each is a clickable <a> group
      const heroLabels = heroes.map((h, i) => {
        const stateColor = h.state === 'hunt' ? '#e05555' : h.state === 'wounded' ? '#cc8822' : h.state === 'flee' ? '#55aaee' : '#66bb77';
        const icon = h.state === 'hunt' ? '⚔' : h.state === 'wounded' ? '✞' : h.state === 'flee' ? '↪' : '◈';
        const slug = slugify(h.name);
        return `<text y="${18 + i * 15}" text-anchor="middle"
          font-size="10" fill="${stateColor}" font-family="Courier New"
          style="cursor:pointer;" data-hero-slug="${slug}">${icon} ${h.name}</text>`;
      }).join('');

      // Dot (also clickable if city has a single hero)
      const dotClick = heroes.length === 1 ? `style="cursor:pointer;" data-hero-slug="${slugify(heroes[0].name)}"` : '';

      return `<g class="map-city-marker" data-cx="${px}" data-cy="${py}" transform="translate(${px},${py})">
        <circle r="${dotR}" fill="${dotColor}" opacity="0.9" ${dotClick}/>
        ${hasHero ? `<circle r="${dotR + 5}" fill="none" stroke="${dotColor}" stroke-width="0.8" opacity="0.35"/>` : ''}
        ${cityLabel}
        ${heroLabels}
      </g>`;
    }).join('');

    // Compass rose (bottom-right, fixed — outside zoom layer)
    const CR = { x: W_SVG - 36, y: H_SVG - 36 };
    const compassRose = `
      <g opacity="0.4" pointer-events="none">
        <line x1="${CR.x}" y1="${CR.y-14}" x2="${CR.x}" y2="${CR.y+14}" stroke="#6a4888" stroke-width="0.8"/>
        <line x1="${CR.x-14}" y1="${CR.y}" x2="${CR.x+14}" y2="${CR.y}" stroke="#6a4888" stroke-width="0.8"/>
        <text x="${CR.x}" y="${CR.y-17}" text-anchor="middle" font-size="8" fill="#6a4888" font-family="Courier New">N</text>
      </g>`;

    const zoomHint = `<text x="10" y="16" font-size="8" fill="#3a1a50" font-family="Courier New" letter-spacing="1" pointer-events="none">scroll to zoom · drag to pan · dbl-click to reset</text>`;

    wrap.innerHTML = `
      <svg id="map-svg" viewBox="0 0 ${W_SVG} ${H_SVG}" xmlns="http://www.w3.org/2000/svg"
           style="width:100%;height:auto;display:block;background:#06000a;border:1px solid #2a1040;cursor:grab;">
        <!-- Geography layer: scales with zoom -->
        <g id="map-geo-layer">
          ${gridLines.join('')}
          ${landPath}
          ${riverPaths}
          ${mountainSvg}
        </g>
        <!-- Overlay layer: repositioned but NOT scaled — markers stay fixed-size -->
        <g id="map-overlay-layer">
          ${cityMarkerGroups}
        </g>
        <!-- Fixed UI elements -->
        ${compassRose}
        ${zoomHint}
        <text x="10" y="${H_SVG - 10}" font-size="9" fill="#3a1a50" font-family="Courier New" letter-spacing="2" pointer-events="none">GOTHIC RPG — WORLD MAP</text>
      </svg>`;

    // ── Click delegation for hero labels + dots ─────────────
    document.getElementById('map-overlay-layer').addEventListener('click', (e) => {
      const slug = e.target.dataset.heroSlug;
      if (slug) window.open(`/hero?name=${slug}`, '_blank');
    });

    // ── D3 zoom behaviour ───────────────────────────────────
    const svgEl  = document.getElementById('map-svg');
    const geoLayer = document.getElementById('map-geo-layer');
    const markers  = document.querySelectorAll('#map-overlay-layer .map-city-marker');

    const zoom = d3.zoom()
      .scaleExtent([0.5, 14])
      .on('zoom', (event) => {
        const { x, y, k } = event.transform;

        // Scale geography (land, rivers, grid)
        geoLayer.setAttribute('transform', `translate(${x},${y}) scale(${k})`);

        // Reposition each marker without scaling it
        markers.forEach(g => {
          const cx = parseFloat(g.dataset.cx);
          const cy = parseFloat(g.dataset.cy);
          // Screen position = zoom_origin + projected_point * scale
          const sx = x + cx * k;
          const sy = y + cy * k;
          g.setAttribute('transform', `translate(${sx},${sy})`);
        });

        svgEl.style.cursor = event.sourceEvent?.buttons ? 'grabbing' : 'grab';
      });

    d3.select(svgEl).call(zoom);

    // Double-click resets zoom
    svgEl.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      d3.select(svgEl).transition().duration(400).call(zoom.transform, d3.zoomIdentity);
    });
  }

  // ─────────────────────────────────────────────────────────
  //  Boot
  // ─────────────────────────────────────────────────────────
  // Hide "Join the World" if user already has a hero
  (function updateJoinBtn() {
    const btn = document.getElementById('btn-join');
    if (!btn) return;
    const claim = getClaim();
    if (claim) {
      btn.style.display = 'none';
    } else {
      btn.style.display = '';
    }
  })();

  setSaveStatus('connecting...');
  connectSSE();
})();
</script>
